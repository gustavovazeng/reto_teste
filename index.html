<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rafa Livramento — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--card:#121826;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.12);
  --text:#e8edf6;--text-strong:#f1f5fb;--muted:#8a96ab;--hint:#6b7689;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.16);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --surf:rgba(255,255,255,.03);
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ─── App Header ─────────────────────────────────────────────────── */
.app-hdr{position:sticky;top:0;z-index:20;background:rgba(12,17,28,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 26px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:16px}

.proj-wrap{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surf)}
.proj-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.proj-name{font-size:12px;font-weight:600;color:var(--text-strong)}
.proj-status{font-size:9px;color:var(--green);letter-spacing:.04em}

/* Nav tabs */
.hdr-tabs{display:flex;align-items:center;gap:4px}
.htab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.htab:hover{color:var(--text)}
.htab.htab-active{background:rgba(59,130,246,.16);color:#fff}
.htab-icon{font-size:13px}

/* Period controls */
.hdr-right{display:flex;align-items:center;gap:8px}
.presets{display:flex;gap:4px}
.btn-pre{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-pre:hover{border-color:var(--border-h);color:var(--text)}
.btn-pre.on{background:rgba(59,130,246,.16);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}
.drbox{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s;padding:0 6px;gap:3px}
.drbox:focus-within{border-color:rgba(96,165,250,.5)}
.drbox-icon{color:var(--hint);font-size:12px;user-select:none}
.drbox input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 4px;cursor:pointer;color-scheme:dark;width:100px}
.drbox-sep{color:var(--hint);font-size:11px;user-select:none}
.btn-update{background:rgba(59,130,246,.16);border:1px solid rgba(96,165,250,.3);color:#60a5fa;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:0 0 16px rgba(59,130,246,.2)}
.btn-update:hover:not(:disabled){box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-update:disabled{opacity:.4;cursor:not-allowed}

/* ─── Content ────────────────────────────────────────────────────── */
.app-content{max-width:1640px;margin:0 auto;padding:22px 30px 40px}
.page{display:none}.page.active{display:block}

/* Page header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hdr-title{font-size:22px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text-strong);line-height:1.25}
.hdr-sub{margin-top:5px;font-size:11px;color:var(--hint);font-family:'JetBrains Mono',monospace}
.err{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--red);line-height:1.5}

/* KPIs */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.kc:hover{border-color:var(--border-h)}
.kc-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:700}
.kc-val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em;font-size:22px;line-height:1.1;color:var(--text-strong)}
.kc-val-sm{font-size:18px}
.kc-sub{font-size:10px;color:var(--hint);margin-top:5px;font-family:'JetBrains Mono',monospace}

/* Section label */
.section-lbl{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;margin-top:20px}

/* Status legend */
.status-legend{display:flex;gap:16px;margin-bottom:14px}
.sl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--hint)}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Charts */
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px 14px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.lg{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ll{width:14px;height:2px;border-radius:2px}
.ld{width:7px;height:7px;border-radius:50%}
.charts-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.charts-2x3{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* Toggle overlay buttons */
.overlay-btns{display:flex;gap:6px}
.btn-overlay{font-size:10px;padding:3px 10px;border-radius:5px;border:1px solid var(--border-h);color:var(--muted);background:transparent;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.btn-overlay:hover{border-color:var(--accent);color:var(--text)}
.btn-overlay.on{background:var(--accent-bg);border-color:rgba(96,165,250,.4);color:#60a5fa;font-weight:600}

/* Tooltip */
.tip{background:#1a2236;border:1px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px;box-shadow:0 4px 16px rgba(2,6,20,.45);display:none;position:absolute;pointer-events:none;z-index:20;min-width:150px}
.tl{color:var(--hint);margin-bottom:5px;font-weight:500;font-size:10px;font-family:'JetBrains Mono',monospace}
.tr{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px;font-size:11px}
.tv{color:var(--text-strong);font-weight:600;font-family:'JetBrains Mono',monospace}

/* Spinner */
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{color:var(--hint);font-size:13px}
.foot{margin-top:18px;font-size:10px;color:var(--hint);text-align:center;font-family:'JetBrains Mono',monospace;opacity:.5}
canvas{display:block}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;filter:invert(1)}

/* Funil (simplified single-product) */
.funnel-stage{display:grid;grid-template-columns:170px 1fr 90px 70px;gap:12px;align-items:center;padding:10px 0}
.funnel-bar-wrap{background:rgba(255,255,255,.04);border-radius:8px;height:34px;position:relative;overflow:hidden}
.funnel-bar{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:12px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#0a0e17;white-space:nowrap;transition:width .3s}
.funnel-name{font-size:12px;color:var(--text);font-weight:600}
.funnel-count{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-strong);text-align:right}
.funnel-pct{font-size:11px;color:var(--hint);text-align:right;font-family:'JetBrains Mono',monospace}

/* Tables */
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable th{padding:8px 12px;text-align:right;background:var(--surf);border-bottom:1px solid var(--border);color:var(--hint);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;white-space:nowrap}
.dtable th:first-child,.dtable th.tleft{text-align:left}
.dtable th:hover{color:var(--text)}
.dtable td{padding:8px 12px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text)}
.dtable td:first-child,.dtable td.tleft{text-align:left;font-family:'DM Sans',sans-serif}
.dtable tr.totrow td{border-top:2px solid var(--border-h);font-weight:700;color:var(--text-strong)}
.search-box{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:220px}
.search-box:focus{border-color:rgba(96,165,250,.5)}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

/* Quick period inside pages */
.period-wrap{margin-bottom:18px}
.period-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.period-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.period-quick{display:flex;gap:5px;flex-wrap:wrap}
.btn-q{background:transparent;border:1px solid var(--border);color:var(--hint);padding:4px 11px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn-q:hover{border-color:var(--border-h);color:var(--text)}
.btn-q.on{background:var(--accent-bg);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}

/* ─── Mobile Responsive ────────────────────────────────────────── */
@media(max-width:768px){
  .app-hdr{height:auto;flex-wrap:wrap;padding:0;gap:0;align-items:stretch}
  .proj-wrap{padding:9px 14px;flex-shrink:0;border-bottom:1px solid var(--border);width:auto;border-radius:0;border-left:none;border-right:none;border-top:none}
  .hdr-right{order:2;flex:1;min-width:0;display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 14px 8px 8px;flex-wrap:nowrap;border-bottom:1px solid var(--border)}
  .hdr-right::-webkit-scrollbar{display:none}
  .presets{flex-wrap:nowrap;gap:3px}
  .btn-pre{font-size:10px;padding:4px 8px;flex-shrink:0}
  .drbox{flex-shrink:0}
  .drbox input[type=date]{width:86px;font-size:10px}
  .btn-update{font-size:11px;padding:5px 10px;flex-shrink:0}
  .hdr-tabs{order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;gap:2px;padding:6px 14px 8px}
  .hdr-tabs::-webkit-scrollbar{display:none}
  .htab{flex-shrink:0;font-size:11px;padding:5px 10px}
  .htab-icon{font-size:12px}
  .app-content{padding:14px 10px 30px;max-width:100%}
  .hdr{flex-direction:column;gap:6px;margin-bottom:14px}
  .hdr-title{font-size:18px}
  .g3,.g4,.g5{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .kc{padding:12px 13px}
  .kc-val{font-size:18px}
  .kc-val-sm{font-size:15px}
  [style*="repeat(3,1fr)"],[style*="repeat(4,1fr)"],[style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"],[style*="repeat(7,1fr)"],[style*="repeat(8,1fr)"]{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  [style*="1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="220px 1fr"]{grid-template-columns:1fr!important}
  .charts-2x2,.charts-2x3{grid-template-columns:1fr!important;gap:10px!important}
  .page div[style*="overflow:hidden"]{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
  .page table{font-size:10px!important}
  .page td,.page th{padding:7px 8px!important;white-space:nowrap}
  .page td:first-child,.page th:first-child{white-space:normal;min-width:90px;max-width:140px}
  .status-legend{flex-wrap:wrap;gap:8px}
  .period-quick{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .period-quick::-webkit-scrollbar{display:none}
  .btn-q{flex-shrink:0;font-size:10px;padding:3px 9px}
  .funnel-stage{grid-template-columns:110px 1fr 60px 50px;gap:6px}
  .section-lbl{margin-top:16px}
}
</style>
</head>
<body>
<!-- ─── App Header ───────────────────────────────────────────────── -->
<header class="app-hdr">
  <div class="proj-wrap">
    <span class="proj-dot"></span>
    <div>
      <div class="proj-name">Rafa Livramento</div>
      <div class="proj-status">ativo</div>
    </div>
  </div>

  <nav class="hdr-tabs" id="hdr-tabs"></nav>

  <div class="hdr-right">
    <div class="presets" id="hdr-presets">
      <button class="btn-pre" id="hpre-hoje" onclick="applyQuickCurrent('hoje')">Hoje</button>
      <button class="btn-pre" id="hpre-ontem" onclick="applyQuickCurrent('ontem')">Ontem</button>
      <button class="btn-pre" id="hpre-7d" onclick="applyQuickCurrent('7d')">7 dias</button>
      <button class="btn-pre on" id="hpre-30d" onclick="applyQuickCurrent('30d')">30 dias</button>
      <button class="btn-pre" id="hpre-mes" onclick="applyQuickCurrent('mes')">Este mês</button>
    </div>
    <div class="drbox">
      <span class="drbox-icon">📅</span>
      <input type="date" id="hdr-start" onchange="onDCCurrent('s',this.value)"/>
      <span class="drbox-sep">→</span>
      <input type="date" id="hdr-end" onchange="onDCCurrent('e',this.value)"/>
    </div>
    <button class="btn-update" id="btn-update" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</header>

<!-- ─── Content ──────────────────────────────────────────────────── -->
<div class="app-content">
  <div class="sw" id="loading"><div class="sp"></div><p class="st">Carregando dados...</p></div>
  <div id="err-panel" style="display:none;align-items:flex-start;justify-content:center;padding:40px 24px"></div>
  <div id="page-principal" class="page active"></div>
  <div id="page-trafego"   class="page"></div>
  <div id="page-funil"     class="page"></div>
  <div id="page-anuncios"  class="page"></div>
  <div id="page-resumo"    class="page"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// Rafa Livramento — Dashboard de vendas (produto único, BRL)
// Fonte de dados: Google Sheets (planilha pública) via Sheets API v4
// ══════════════════════════════════════════════════════════════════════════

const SHEET_ID  = "1u5zoV0lglcJsaU-OiuQVeeJ_XF1t7SDcaaeXD7fsST8";
const GAPI_KEY  = "AIzaSyDFyD63YrWNWSX2gjZWdVD5Bq8uoazXzbE";
const SHEET_COMPRADORES = "Base compradores";
const SHEET_META        = "Base meta";

// Metas de referência (ajustáveis)
const META_ROAS   = 1.0;
const META_CPV    = 37;
const META_TICKET = 47;
const METAS_T = {
  cpc:      {val:0.24,  higher:false},
  ctr:      {val:2.5,   higher:true},
  cpm:      {val:5.96,  higher:false},
  txPagChk: {val:5.3,   higher:true},
  txChkVnd: {val:18.3,  higher:true},
  connect:  {val:70,    higher:true},
};

const CHART_COLOR = "#3b82f6";
const CHART_INV   = "#3b82f6";
const CHART_CPV   = "#fbbf24";
const TAXA_IMPOSTO = 1.0;

// ── State ───────────────────────────────────────────────────────────────
const S = {
  meta:{},            // date -> {spend,clicks,impressions,landingViews,checkouts}
  metaByAdv:{},        // advCode -> {advCode,adName,campName,adStatus,campStatus,adsetStatus,spend,clicks,impressions,checkouts,byDate:{}}
  metaByPlatform:{},   // "Instagram (Ads)"/"Facebook (Ads)" -> {spend,clicks,impressions}
  vendas:{},           // date -> {qtd,valor}  (produto principal, SOMENTE tráfego pago)
  vendasOrganico:{},   // date -> {qtd,valor}  (produto principal, SOMENTE orgânico/direto)
  vendasByAdv:{},      // advCode -> {qtd,valor}  (tráfego pago atribuído)
  vendasByAdvDate:{},  // advCode -> date -> {qtd,valor}
  vendasByPlatform:{}, // label -> {qtd,valor}
  vendasByFormat:{},   // label -> {qtd,valor,platform}
  upsell:{},           // date -> {qtd,valor}  (ex: Gravação — order bump/upsell)
  upsellName:"Upsell",
  comprasPrincipal:[], // [{date,email,valor,canal}] — para cálculos da aba Funil (tráfego+orgânico)
  comprasUpsell:[],    // [{date,email,valor}]
  productName:"Produto",
  updated:null, loading:true, error:null, firstLoad:true,
  startDate:nDaysAgoISO(29), endDate:todayISO(), activeQuick:"30d",
  overlays:{cpc:{inv:false,cpv:false},ctr:{inv:false,cpv:false},cpm:{inv:false,cpv:false},
    txPagChk:{inv:false,cpv:false},txChkVnd:{inv:false,cpv:false},connect:{inv:false,cpv:false}},
  aSort:{col:"spend",dir:"desc"}, adSearch:"",
  cSort:{col:"spend",dir:"desc"}, campSearch:"",
  selectedCamps:new Set(), selectedAds:new Set(),
  lastClickedCamp:null, lastClickedAd:null,
  manualSpendHoje:null,
  currentPage:"principal",
};

// ── Date helpers (GMT-3 Brasil) ─────────────────────────────────────────────
function nowSP(){ return new Date(Date.now()-3*60*60*1000); }
function toISODate(d){ return d.toISOString().split("T")[0]; }
function todayISO(){ return toISODate(nowSP()); }
function yesterdayISO(){ const d=nowSP();d.setDate(d.getDate()-1);return toISODate(d); }
function nDaysAgoISO(n){ const d=nowSP();d.setDate(d.getDate()-n);return toISODate(d); }
function firstOfMonthISO(){ const d=nowSP();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
function subDays(iso,n){ const d=new Date(iso+"T12:00:00Z");d.setDate(d.getDate()-n);return toISODate(d); }

// ── Format helpers ─────────────────────────────────────────────────────────
// Aceita tanto "1.234,56" (BR) quanto "36.99" (US) — detecta pelo separador presente
function parseBRL(s){
  if(!s||s==="-"||s==="0")return 0;
  let str=String(s).replace(/R\$\s*/g,"").trim();
  if(str.includes(",")) str=str.replace(/\./g,"").replace(",",".");
  return parseFloat(str)||0;
}
// Classifica a linha de compra: produto principal vs upsell/order bump (ex: "Gravação")
function classifyProduct(produto){
  const p=(produto||"").toLowerCase();
  if(p.includes("gravação")||p.includes("gravacao")) return "upsell";
  return "principal";
}
function toISO(s){ if(!s||s==="Date"||s==="")return null;s=String(s).trim().split(" ")[0]; if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const p=s.split("/");if(p.length===3){const y=p[2].length===4?p[2]:"20"+p[2];return `${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}return null; }
function fBRL(n){ n=n||0; const neg=n<0; const s=Math.abs(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); return (neg?"-":"")+"R$ "+s; }
function fBRLShort(n){ const a=Math.abs(n||0),sg=n<0?"-":"";if(a>=1000)return sg+"R$"+(a/1000).toFixed(1).replace(".",",")+"k";return sg+"R$"+Math.round(a); }
function fPct(n){ return (n||0).toFixed(1).replace(".",",")+"%"; }
function fDate(iso){ if(!iso)return"";const[,m,d]=iso.split("-");return `${d}/${m}`; }
function fDateBR(iso){ if(!iso)return"";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`; }
function parseSheet(json){ const rows=json.values||[];if(rows.length<2)return[];const h=rows[0];return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||"").trim()]))); }

// Status color — dark mode semantics
function statusColor(val,meta,higherIsBetter){
  if(!val||val===0)return "#8a96ab";
  const ratio=val/meta;
  if(higherIsBetter){ if(ratio>=1)return "#34d399";if(ratio>=0.9)return "#fbbf24";return "#f87171"; }
  else { if(ratio<=1)return "#34d399";if(ratio<=1.1)return "#fbbf24";return "#f87171"; }
}
function statusBorder(val,meta,higherIsBetter){
  const c=statusColor(val,meta,higherIsBetter);
  if(c==="#34d399") return "rgba(52,211,153,.22)";
  if(c==="#fbbf24") return "rgba(251,191,36,.22)";
  if(c==="#f87171") return "rgba(248,113,113,.22)";
  return "var(--border)";
}

// ── Extração de código do anúncio (adv001, adv002, ...) ─────────────────────
function extractAdvCode(name){
  if(!name) return null;
  const clean=name.replace(/^teste-/i,"");
  const m=clean.match(/ad[vic]\d+/i);
  return m ? m[0].toLowerCase() : null;
}

// ── Parser do campo SCK (rastreio de origem da venda) ────────────────────────
// Anúncios Meta: "FBAds_{placement}|{campanha}_id_{campId}|ofc_{fonte}|{adName}_id_{adId}|{adset}_id_{adsetId}"
// Orgânico:      "{canal}|{formato}|{campanha}|{conteudo}|"
function parseSCK(sck){
  if(!sck) return {paid:false,channel:"",medium:""};
  sck=String(sck).trim();
  if(/^FBAds/i.test(sck)){
    const parts=sck.split("|");
    const adSeg=parts[3]||"";
    const advCode=extractAdvCode(adSeg);
    const placement=(parts[0]||"").replace(/^FBAds_/i,"");
    return {paid:true, advCode, placement};
  }
  const parts=sck.split("|");
  return {paid:false, channel:(parts[0]||"").toLowerCase(), medium:(parts[1]||"").toLowerCase()};
}
function platformFromPlacement(pl){
  const p=(pl||"").toLowerCase();
  if(p.includes("instagram")) return "Instagram (Ads)";
  if(p.includes("facebook"))  return "Facebook (Ads)";
  if(p.includes("messenger")) return "Messenger (Ads)";
  if(p.includes("audience"))  return "Audience Network";
  return pl?("Meta Ads — "+pl):"Meta Ads";
}
function formatFromPlacement(pl){
  const p=(pl||"").toLowerCase();
  if(p.includes("stor"))    return "Stories";
  if(p.includes("reel"))    return "Reels";
  if(p.includes("feed"))    return "Feed";
  if(p.includes("instream"))return "In-stream Video";
  return pl?pl.replace(/_/g," "):"Outro";
}
function organicPlatformLabel(ch){
  const c=(ch||"").toLowerCase();
  if(c==="ig"||c==="instagram") return "Instagram (orgânico)";
  if(c==="fb"||c==="facebook")  return "Facebook (orgânico)";
  return ch?ch+" (orgânico)":"Orgânico / direto";
}
function organicFormatLabel(md){
  const m=(md||"").toLowerCase();
  if(m==="story")  return "Stories";
  if(m==="social") return "Link na bio";
  return md||"Outro";
}
function publisherPlatformLabel(p){
  const pl=(p||"").toLowerCase().trim();
  if(pl==="instagram") return "Instagram (Ads)";
  if(pl==="facebook")  return "Facebook (Ads)";
  if(pl==="messenger") return "Messenger (Ads)";
  if(pl==="audience_network") return "Audience Network";
  return pl?pl:"";
}

// ── Sheets API ──────────────────────────────────────────────────────────────
async function fetchSheetPaged(tab, lastCol="L", pageSize=5000){
  const allValues=[];
  let startRow=1;
  while(true){
    const endRow=startRow+pageSize-1;
    const range=`${encodeURIComponent(tab)}!A${startRow}:${lastCol}${endRow}`;
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${GAPI_KEY}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`Sheets API: HTTP ${res.status} ao buscar aba "${tab}"`);
    const data=await res.json();
    const rows=data.values||[];
    allValues.push(...rows);
    if(rows.length<pageSize) break;
    startRow+=pageSize;
  }
  return {values:allValues};
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData(force=false){
  S.loading=true; S.error=null; render();

  let compJ, metaJ;
  try{
    [compJ, metaJ] = await Promise.all([
      fetchSheetPaged(SHEET_COMPRADORES,"G",5000),
      fetchSheetPaged(SHEET_META,"U",5000),
    ]);
    console.log("[sheets] Compradores:",compJ.values.length-1,"linhas | Meta:",metaJ.values.length-1,"linhas");
  }catch(fetchErr){
    S.loading=false;
    S.error="Erro ao buscar dados do Google Sheets: "+fetchErr.message;
    S.firstLoad=false;
    render();
    return;
  }
  S.loading=false; S.error=null;

  try{
    // ── Base meta (anúncios) ────────────────────────────────────────────────
    const mD={}, mByAdv={}, mByPlatform={};
    for(const r of parseSheet(metaJ)){
      const d=toISO(r["Date"]); if(!d) continue;
      if(!mD[d]) mD[d]={spend:0,clicks:0,impressions:0,landingViews:0,checkouts:0};
      const spendV = parseBRL(r["Spend (Cost, Amount Spent)"]);
      const clicksV= parseInt(r["Action Link Clicks"]||0)||0;
      const imprV  = parseInt(r["Impressions"]||0)||0;
      const lvV    = parseInt(r["Action Landing Page View"]||0)||0;
      const ckV    = parseInt(r["Action Omni Initiated Checkout"]||0)||0;
      mD[d].spend+=spendV; mD[d].clicks+=clicksV; mD[d].impressions+=imprV;
      mD[d].landingViews+=lvV; mD[d].checkouts+=ckV;

      const adName    = r["Ad Name"]||"";
      const campName  = r["Campaign Name"]||"—";
      const adStatusR = r["Ad Status"]||"";
      const campStatusR = r["Campaign Status"]||"";
      const adsetStatusR= r["Adset Status"]||"";
      const igUrl     = r["Instagram Permalink URL"]||"";
      const advCode   = extractAdvCode(adName);
      if(advCode){
        if(!mByAdv[advCode]) mByAdv[advCode]={advCode,adName,campName,adStatus:"",campStatus:"",adsetStatus:"",lastStatusDate:"",igUrl:"",spend:0,clicks:0,impressions:0,checkouts:0,byDate:{}};
        const a=mByAdv[advCode];
        a.spend+=spendV; a.clicks+=clicksV; a.impressions+=imprV; a.checkouts+=ckV;
        if(!a.byDate[d]) a.byDate[d]={spend:0,clicks:0,impressions:0,checkouts:0};
        a.byDate[d].spend+=spendV; a.byDate[d].clicks+=clicksV; a.byDate[d].impressions+=imprV; a.byDate[d].checkouts+=ckV;
        if(!a.lastStatusDate||d>=a.lastStatusDate){
          a.adStatus=adStatusR; a.campStatus=campStatusR; a.adsetStatus=adsetStatusR; a.lastStatusDate=d;
        }
        if(adName) a.adName=adName;
        if(campName&&campName!=="—") a.campName=campName;
        if(igUrl && !a.igUrl) a.igUrl=igUrl;
      }
      const pubLabel=publisherPlatformLabel(r["Publisher Platform (Breakdown)"]);
      if(pubLabel){
        if(!mByPlatform[pubLabel]) mByPlatform[pubLabel]={spend:0,clicks:0,impressions:0};
        mByPlatform[pubLabel].spend+=spendV; mByPlatform[pubLabel].clicks+=clicksV; mByPlatform[pubLabel].impressions+=imprV;
      }
    }
    S.meta=mD; S.metaByAdv=mByAdv; S.metaByPlatform=mByPlatform;

    // ── Base compradores (vendas) ───────────────────────────────────────────
    // Produto principal (qualquer nome de oferta, ex: "Imersão O Fim do Ciclo" / "Imersão O Chamado")
    // é tratado como a mesma oferta. "Gravação" é upsell/order bump e fica separado.
    // Cada venda do produto principal é classificada em "tráfego" (SCK de anúncio pago)
    // ou "orgânico" (demais SCK). S.vendas = tráfego (usado no ROAS/CPV/Tráfego/Resumo);
    // S.vendasOrganico = orgânico (só aparece no gráfico dedicado e na aba Funil).
    const vD={}, vOrg={}, vByAdv={}, vByAdvDate={}, vByPlatform={}, vByFormat={};
    const uD={};
    const comprasPrincipal=[], comprasUpsell=[];
    let lastISO="", productName="", upsellName="";
    for(const raw of parseSheet(compJ)){
      const d=toISO(raw["Data da compra"]); if(!d) continue;
      const valor=parseBRL(raw["Valor"]);
      const produto=raw["Produto"]||"";
      const classe=classifyProduct(produto);
      const email=(raw["Email"]||"").toLowerCase().trim();
      if(d>lastISO) lastISO=d;

      if(classe==="upsell"){
        if(!upsellName && produto) upsellName=produto;
        if(!uD[d]) uD[d]={qtd:0,valor:0};
        uD[d].qtd+=1; uD[d].valor+=valor;
        comprasUpsell.push({date:d,email,valor});
        continue;
      }
      if(!productName && produto) productName=produto;

      const info=parseSCK(raw["SCK"]||"");
      comprasPrincipal.push({date:d,email,valor,canal:info.paid?"trafego":"organico"});

      if(info.paid){
        if(!vD[d]) vD[d]={qtd:0,valor:0};
        vD[d].qtd+=1; vD[d].valor+=valor;
        if(info.advCode){
          if(!vByAdv[info.advCode]) vByAdv[info.advCode]={qtd:0,valor:0};
          vByAdv[info.advCode].qtd+=1; vByAdv[info.advCode].valor+=valor;
          if(!vByAdvDate[info.advCode]) vByAdvDate[info.advCode]={};
          if(!vByAdvDate[info.advCode][d]) vByAdvDate[info.advCode][d]={qtd:0,valor:0};
          vByAdvDate[info.advCode][d].qtd+=1; vByAdvDate[info.advCode][d].valor+=valor;
        }
        const platLabel=platformFromPlacement(info.placement);
        if(!vByPlatform[platLabel]) vByPlatform[platLabel]={qtd:0,valor:0};
        vByPlatform[platLabel].qtd+=1; vByPlatform[platLabel].valor+=valor;
        const fmtLabel=formatFromPlacement(info.placement);
        if(!vByFormat[fmtLabel]) vByFormat[fmtLabel]={qtd:0,valor:0,platform:platLabel};
        vByFormat[fmtLabel].qtd+=1; vByFormat[fmtLabel].valor+=valor;
      } else {
        if(!vOrg[d]) vOrg[d]={qtd:0,valor:0};
        vOrg[d].qtd+=1; vOrg[d].valor+=valor;
        const platLabel=organicPlatformLabel(info.channel);
        if(!vByPlatform[platLabel]) vByPlatform[platLabel]={qtd:0,valor:0};
        vByPlatform[platLabel].qtd+=1; vByPlatform[platLabel].valor+=valor;
        const fmtLabel=organicFormatLabel(info.medium);
        if(!vByFormat[fmtLabel]) vByFormat[fmtLabel]={qtd:0,valor:0,platform:platLabel};
        vByFormat[fmtLabel].qtd+=1; vByFormat[fmtLabel].valor+=valor;
      }
    }
    S.vendas=vD; S.vendasOrganico=vOrg; S.vendasByAdv=vByAdv; S.vendasByAdvDate=vByAdvDate;
    S.vendasByPlatform=vByPlatform; S.vendasByFormat=vByFormat;
    S.upsell=uD; S.upsellName=upsellName||"Upsell";
    S.comprasPrincipal=comprasPrincipal; S.comprasUpsell=comprasUpsell;
    S.productName=productName||"Produto";
    S.updated=lastISO?fDateBR(lastISO):"—";
    S.firstLoad=false;
  }catch(e){
    S.error="Erro ao processar dados: "+e.message;
    S.firstLoad=false;
    console.error("processing error:",e);
  }
  render();
}

function getDaily(start,end){
  const d=D();

  return Array.from(all).sort().filter(dt=>dt>=start&&dt<=end).map(date=>{

// ── Canvas drawing ─────────────────────────────────────────────────────────
const DPR=window.devicePixelRatio||1;
const GRID_C="rgba(255,255,255,0.06)";
const TICK_C="#6b7689";

function initCanvas(id,cssW,cssH){
  const c=document.getElementById(id);if(!c)return null;
  c.width=Math.round(cssW*DPR);c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px";c.style.height=cssH+"px";
  const ctx=c.getContext("2d");ctx.scale(DPR,DPR);
  return ctx;
}
function drawLineArea(ctx,xP,yP,vals,color,fill=true){
  if(vals.length<2)return;
  if(fill){
    const n=vals.length;
    ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<n;i++)ctx.lineTo(xP(i),yP(vals[i]));
    const yZero=yP(0);
    ctx.lineTo(xP(n-1),yZero);ctx.lineTo(xP(0),yZero);ctx.closePath();
    const cH=ctx.canvas.height/DPR;
    const g=ctx.createLinearGradient(0,0,0,cH);
    g.addColorStop(0,color+"28");g.addColorStop(1,color+"00");
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.moveTo(xP(0),yP(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(xP(i),yP(vals[i]));
  ctx.stroke();
}
function drawChartWithOverlay(id, data, key, fmtY, refVal, refLabel, overlayInv, overlayCpv, cssW, cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:12,r:overlayInv||overlayCpv?52:12,b:26,l:52};
  const cW=cssW-P.l-P.r, cH=cssH-P.t-P.b;
  const vals=data.map(d=>+(d[key])||0);
  const invVals=data.map(d=>d.spend||0);
  const cpvVals=data.map(d=>d.cpv||0);
  let allL=[...vals];if(refVal!=null)allL.push(refVal);
  const lMax=Math.max(...allL,0.01)*1.2, lMin=0;
  const rVals=overlayCpv?cpvVals:invVals;
  const rMax=overlayInv||overlayCpv?Math.max(...rVals,0.01)*1.2:1;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-((v-lMin)/(lMax-lMin))*cH;
  const yPR=v=>P.t+cH-((v-0)/(rMax-0))*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    const lv=lMax-(i/4)*(lMax-lMin);
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(fmtY(lv),P.l-4,y+3);
  }
  if(overlayInv||overlayCpv){
    const ovColor=overlayInv?CHART_INV:CHART_CPV;
    const ovFmt=overlayInv?fBRLShort:v=>"R$"+v.toFixed(2);
    for(let i=0;i<=4;i++){
      const rv=rMax-(i/4)*(rMax-0);
      const y=P.t+(i/4)*cH;
      ctx.fillStyle=ovColor;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="left";
      ctx.fillText(ovFmt(rv),P.l+cW+4,y+3);
    }
  }
  if(refVal!=null){
    const ry=yPL(refVal);
    ctx.strokeStyle=CHART_COLOR+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(P.l,ry);ctx.lineTo(P.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=CHART_COLOR;ctx.font="8px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText(refLabel||"Meta",P.l+cW,ry-3);
  }
  drawLineArea(ctx,xP,yPL,vals,CHART_COLOR,true);
  if(overlayInv) drawLineArea(ctx,xP,yPR,invVals,CHART_INV,false);
  if(overlayCpv) drawLineArea(ctx,xP,yPR,cpvVals,CHART_CPV,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}
function drawDual(id,data,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:14,r:52,b:28,l:58};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const lVals=data.map(d=>d.spend||0);
  const rVals=data.map(d=>d.cpv||0);
  const lMax=Math.max(...lVals,0.01)*1.15;
  const rMax=Math.max(...rVals,META_CPV,0.01)*1.4;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-((v-0)/(lMax-0))*cH;
  const yPR=v=>P.t+cH-((v-0)/(rMax-0))*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";
    ctx.textAlign="right";ctx.fillText(fBRLShort(lMax-(i/4)*lMax),P.l-5,y+3.5);
    ctx.textAlign="left";ctx.fillText("R$"+(rMax-(i/4)*rMax).toFixed(0),P.l+cW+5,y+3.5);
  }
  const mY=yPR(META_CPV);
  ctx.strokeStyle=CHART_CPV+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(P.l,mY);ctx.lineTo(P.l+cW,mY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=CHART_CPV;ctx.font="9px 'Inter',sans-serif";ctx.textAlign="left";
  ctx.fillText("Meta "+fBRL(META_CPV),P.l+cW+4,mY-3);
  drawLineArea(ctx,xP,yPL,lVals,CHART_INV,true);
  drawLineArea(ctx,xP,yPR,rVals,CHART_CPV,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}
function drawBarVendas(id, data, cssW, cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:22,r:16,b:26,l:32};
  const cW=cssW-P.l-P.r, cH=cssH-P.t-P.b;
  const n=data.length; if(n===0)return;
  const vals=data.map(d=>d.vendas||0);
  const maxV=Math.max(...vals,1);
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const y=P.t+(i/ticks)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    if(i<ticks){
      const lv=Math.round(maxV-(i/ticks)*maxV);
      ctx.fillStyle=TICK_C;ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign="right";
      ctx.fillText(lv,P.l-4,y+3);
    }
  }
  const slot=cW/n;
  const barW=Math.max(3,Math.min(28,slot*0.6));
  const GREEN="#34d399";
  for(let i=0;i<n;i++){
    const v=vals[i];
    const bh=Math.max(v>0?2:0,(v/maxV)*cH);
    const cx=P.l+slot*i+slot/2;
    const x=cx-barW/2;
    const y=P.t+cH-bh;
    const g=ctx.createLinearGradient(0,y,0,P.t+cH);
    g.addColorStop(0,GREEN+"dd");g.addColorStop(1,GREEN+"55");
    ctx.fillStyle=g;
    const r=Math.min(3,barW/2,bh/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+barW-r,y);
    ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);
    ctx.lineTo(x+barW,y+bh);ctx.lineTo(x,y+bh);ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
    ctx.fill();
    if(v>0){
      ctx.fillStyle="#e8edf6";
      ctx.font=`bold ${Math.max(8,Math.min(11,barW-1))}px 'DM Sans',sans-serif`;
      ctx.textAlign="center";
      ctx.fillText(v,cx,y-4);
    }
  }
  const step=n>60?7:n>30?3:n>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,P.l+slot*i+slot/2,P.t+cH+18);});
}

// Tooltip genérico
function setupTip(cid,tid,data,lines,padL=58,padR=12){
  const c=document.getElementById(cid),t=document.getElementById(tid);
  if(!c||!t)return;
  c.addEventListener("mousemove",e=>{
    const rect=c.getBoundingClientRect();
    const relX=(e.clientX-rect.left)-padL;
    const cW=rect.width-padL-padR;
    if(relX<0||relX>cW||!data.length){t.style.display="none";return;}
    const d=data[Math.max(0,Math.min(Math.round((relX/cW)*(data.length-1)),data.length-1))];
    let h=`<div class="tl">${d.label||d.date}</div>`;
    lines.forEach(l=>{
      h+=`<div class="tr"><span style="color:${l.color}">${l.name}</span><span class="tv">${(l.fmt||fBRL)(+(d[l.key])||0)}</span></div>`;
    });
    t.innerHTML=h;t.style.display="block";
    const tw=t.offsetWidth,x=e.clientX-rect.left;
    t.style.left=(x+12+tw>rect.width-8?x-tw-12:x+12)+"px";
    t.style.top=(e.clientY-rect.top-20)+"px";
  });
  c.addEventListener("mouseleave",()=>t.style.display="none");
}

}

    CHART_CONFIGS.forEach(c=>{
      const ov=S.overlays[c.key];
      drawChartWithOverlay(`tc-${c.key}`,daily,c.key,c.fmt,c.meta,c.metaLbl,ov.inv,ov.cpv,sW,170);
      const tipLines=[{key:c.key,color:CHART_COLOR,name:c.lbl,fmt:c.fmt}];
      if(ov.inv) tipLines.push({key:"spend",color:CHART_INV,name:"Investimento",fmt:fBRL});
      if(ov.cpv) tipLines.push({key:"cpv",  color:CHART_CPV,name:"CPV",         fmt:fBRL});
      setupTip(`tc-${c.key}`,`tt-${c.key}`,daily,tipLines,52,ov.inv||ov.cpv?52:12);
    });
  });
}

// PÁGINA: Métricas do funil (estilo "Reto": produto principal → upsell)
// Considera TODAS as vendas do produto principal (tráfego + orgânico) + upsell
// ══════════════════════════════════════════════════════════════════════════
function renderFunil(){
  const el=document.getElementById("page-funil");if(!el)return;
  const start=S.startDate, end=S.endDate;

  const pInRange=(S.comprasPrincipal||[]).filter(r=>r.date>=start&&r.date<=end);
  const uInRange=(S.comprasUpsell||[]).filter(r=>r.date>=start&&r.date<=end);
  const qtdPrincipal=pInRange.length;
  const valorPrincipal=pInRange.reduce((a,r)=>a+r.valor,0);
  const qtdUpsell=uInRange.length;
  const valorUpsell=uInRange.reduce((a,r)=>a+r.valor,0);

  // Take rate: % dos compradores do produto principal (por e-mail) que também compraram o upsell
  const emailsPrincipal=new Set(pInRange.map(r=>r.email).filter(Boolean));
  const emailsUpsell=new Set(uInRange.map(r=>r.email).filter(Boolean));
  let matched=0; for(const e of emailsUpsell) if(emailsPrincipal.has(e)) matched++;
  const takeRate=emailsPrincipal.size>0?(matched/emailsPrincipal.size)*100:0;

  const investimento=getTotals(getDaily(start,end)).spend; // gasto total em anúncios no período
  const faturamentoTotal=valorPrincipal+valorUpsell;
  const roasFunil=investimento>0?faturamentoTotal/investimento:0;
  const lucroBruto=faturamentoTotal-(investimento*TAXA_IMPOSTO);
  const ltvMedio=qtdPrincipal>0?faturamentoTotal/qtdPrincipal:0;
  const ticketPrincipal=qtdPrincipal>0?valorPrincipal/qtdPrincipal:0;
  const ticketUpsell=qtdUpsell>0?valorUpsell/qtdUpsell:0;

  const daily=getDailyT(start,end);
  const BOX_MAXW=560;
  const upsellW=Math.max(BOX_MAXW*Math.min(takeRate,100)/100, qtdUpsell>0?190:0);

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Métricas do Funil</div>
        <div class="hdr-sub">base: ${qtdPrincipal.toLocaleString("pt-BR")} compradores de ${S.productName} · atualizado em: ${D().updated||"—"}</div>
      </div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:13px">
      ${kpiCard("Investimento",fBRL(investimento),"Meta Ads","var(--text-strong)")}
      ${kpiCard("Faturamento Total",fBRL(faturamentoTotal),`${S.productName} + ${S.upsellName}`,"var(--text-strong)")}
      ${kpiCard("ROAS Funil",roasFunil.toFixed(2)+"x",null,roasFunil>=META_ROAS?"#34d399":roasFunil>0?"#fbbf24":"var(--hint)")}
      ${kpiCard("Lucro Bruto",fBRL(lucroBruto),null,lucroBruto>=0?"#34d399":"#f87171")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px">
      ${kpiCard("LTV médio",fBRL(ltvMedio),`por comprador ${S.productName}`,"var(--text-strong)")}
      ${kpiCard("Take Rate — "+S.upsellName,fPct(takeRate),`${qtdUpsell} de ${emailsPrincipal.size} compraram`,"#22c55e")}
      ${kpiCard("Ticket "+S.productName,fBRL(ticketPrincipal),null,"var(--text-strong)")}
      ${kpiCard("Ticket "+S.upsellName,qtdUpsell>0?fBRL(ticketUpsell):"—",null,"var(--text-strong)")}
    </div>

    <div style="display:grid;grid-template-columns:1fr 260px;gap:14px;margin-bottom:20px">
      <div class="cc">
        <div class="ch"><span class="ct">Funil de conversão</span></div>
        <div style="padding:24px 10px 10px">
          <div style="max-width:${BOX_MAXW}px;margin:0 auto 22px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:12px;padding:18px 22px;text-align:center;box-shadow:0 8px 24px rgba(59,130,246,.25)">
            <div style="font-size:9px;color:#dbeafe;text-transform:uppercase;letter-spacing:.08em;font-weight:700">Entrada (Front-end)</div>
            <div style="font-size:17px;font-weight:700;color:#fff;font-family:'Sora',sans-serif;margin:4px 0">${S.productName}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#eff6ff">${qtdPrincipal.toLocaleString("pt-BR")} compras · ${fBRLShort(valorPrincipal)}</div>
            <div style="font-size:10px;color:#bfdbfe;margin-top:2px">100%</div>
          </div>
          ${qtdUpsell>0?`
          <div style="max-width:${upsellW}px;min-width:190px;margin:0 auto;background:linear-gradient(135deg,#d97706,#92400e);border-radius:12px;padding:14px 18px;text-align:center;box-shadow:0 8px 20px rgba(217,119,6,.2)">
            <div style="font-size:9px;color:#fef3c7;text-transform:uppercase;letter-spacing:.08em;font-weight:700">Upsell</div>
            <div style="font-size:14px;font-weight:700;color:#fff;font-family:'Sora',sans-serif;margin:3px 0">${S.upsellName}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#fffbeb">${qtdUpsell.toLocaleString("pt-BR")} compras · ${fBRLShort(valorUpsell)}</div>
            <div style="font-size:10px;color:#fde68a;margin-top:2px">${fPct(takeRate)} dos compradores ${S.productName}</div>
          </div>`:`<div style="text-align:center;color:var(--hint);font-size:12px;padding:16px 0">Nenhuma venda de ${S.upsellName} no período</div>`}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:13px">
        ${kpiCard("Compradores "+S.productName, qtdPrincipal.toLocaleString("pt-BR"), "no período","var(--text-strong)")}
        ${kpiCard("Compradores "+S.upsellName, qtdUpsell.toLocaleString("pt-BR"), qtdPrincipal>0?fPct(takeRate)+" do "+S.productName:null,"#22c55e")}
        ${kpiCard("Reembolsos", "—", "a base não traz status de reembolso","var(--hint)")}
      </div>
    </div>

    <div class="charts-2x2">
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">Taxa Página → Checkout</span><span style="font-size:10px;color:var(--hint)">Meta ${fPct(METAS_T.txPagChk.val)}</span></div>
        <div style="position:relative"><canvas id="fc-pagchk"></canvas><div class="tip" id="ft-pagchk"></div></div>
      </div>
      <div class="cc" style="position:relative">
        <div class="ch"><span class="ct">Taxa Checkout → Venda</span><span style="font-size:10px;color:var(--hint)">Meta ${fPct(METAS_T.txChkVnd.val)}</span></div>
        <div style="position:relative"><canvas id="fc-chkvnd"></canvas><div class="tip" id="ft-chkvnd"></div></div>
      </div>
    </div>
    <p class="foot">Base Meta + Base compradores · Google Sheets · funil considera vendas de tráfego + orgânico</p>`;

  requestAnimationFrame(()=>{
    const sW=document.getElementById("fc-pagchk")?.parentElement?.offsetWidth||500;
    drawChartWithOverlay("fc-pagchk",daily,"txPagChk",fPct,METAS_T.txPagChk.val,`Meta ${fPct(METAS_T.txPagChk.val)}`,false,false,sW,170);
    drawChartWithOverlay("fc-chkvnd",daily,"txChkVnd",fPct,METAS_T.txChkVnd.val,`Meta ${fPct(METAS_T.txChkVnd.val)}`,false,false,sW,170);
    setupTip("fc-pagchk","ft-pagchk",daily,[{key:"txPagChk",color:CHART_COLOR,name:"Pág → Checkout",fmt:fPct}]);
    setupTip("fc-chkvnd","ft-chkvnd",daily,[{key:"txChkVnd",color:CHART_COLOR,name:"Checkout → Venda",fmt:fPct}]);
  });
}

// ══════════════════════════════════════════════════════════════════════════
// PÁGINA: Anúncios — Campanhas + Anúncios (somente vendas de tráfego, via SCK)
// Seleção de campanhas filtra os anúncios exibidos; seleção de anúncios gera
// um resumo copiável (igual ao modelo "Reto").
// ══════════════════════════════════════════════════════════════════════════
function renderAnuncios(){
  const el=document.getElementById("page-anuncios");if(!el)return;
  const _focusedId=document.activeElement?.id;
  const start=S.startDate, end=S.endDate;
  const dd=D();

  // ── 1. Linhas de anúncio (por advCode), sem filtro de campanha ainda ─────
  const adRowsAll=[];
  for(const [advCode,adData] of Object.entries(dd.metaByAdv)){
    let spend=0,clicks=0,impressions=0,checkouts=0;
    for(const [d,v] of Object.entries(adData.byDate)){
      if(d>=start&&d<=end){ spend+=v.spend; clicks+=v.clicks; impressions+=v.impressions; checkouts+=v.checkouts; }
    }
    let qtd=0, valor=0;
    const byD=dd.vendasByAdvDate[advCode]||{};
    for(const [vd,vv] of Object.entries(byD)){
      if(vd>=start&&vd<=end){ qtd+=vv.qtd; valor+=vv.valor; }
    }
    if(spend===0&&clicks===0&&impressions===0&&qtd===0) continue;
    const isActive=[adData.adStatus,adData.campStatus,adData.adsetStatus].some(s=>s==="ACTIVE");
    const hasStatusData=!!(adData.adStatus||adData.campStatus||adData.adsetStatus);
    adRowsAll.push({
      advCode, adName:adData.adName, campName:adData.campName||"—", igUrl:adData.igUrl||"",
      adStatus:adData.adStatus, campStatus:adData.campStatus, isActive, hasStatusData,
      spend,clicks,impressions,checkouts,qtd,valor,
      cpc:clicks>0?spend/clicks:0, ctr:impressions>0?(clicks/impressions)*100:0,
      cpm:impressions>0?(spend/impressions)*1000:0,
      cpv:qtd>0?spend/qtd:0, ticket:qtd>0?valor/qtd:0, roas:spend>0?valor/spend:0,
    });
  }

  // ── 2. Linhas de campanha (agrupando os anúncios acima por Campaign Name) ─
  const campMap={};
  for(const r of adRowsAll){
    const key=r.campName;
    if(!campMap[key]) campMap[key]={campName:key,campStatus:r.campStatus,spend:0,clicks:0,impressions:0,checkouts:0,qtd:0,valor:0,adCodes:[]};
    const c=campMap[key];
    c.spend+=r.spend; c.clicks+=r.clicks; c.impressions+=r.impressions; c.checkouts+=r.checkouts;
    c.qtd+=r.qtd; c.valor+=r.valor; c.adCodes.push(r.advCode);
    if(r.campStatus) c.campStatus=r.campStatus;
  }
  const campRows=Object.values(campMap).map(c=>({
    ...c,
    cpc:c.clicks>0?c.spend/c.clicks:0, ctr:c.impressions>0?(c.clicks/c.impressions)*100:0,
    cpm:c.impressions>0?(c.spend/c.impressions)*1000:0,
    cpv:c.qtd>0?c.spend/c.qtd:0, ticket:c.qtd>0?c.valor/c.qtd:0, roas:c.spend>0?c.valor/c.spend:0,
  }));

  const {col:cCol,dir:cDir}=S.cSort;
  const sortedCampsAll=[...campRows].sort((a,b)=>{
    const av=a[cCol]??0,bv=b[cCol]??0;
    if(typeof av==="string") return cDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return cDir==="asc"?av-bv:bv-av;
  });
  const searchC=S.campSearch.trim().toLowerCase();
  const filteredCamps=searchC?sortedCampsAll.filter(r=>r.campName.toLowerCase().includes(searchC)):sortedCampsAll;
  S._campOrder=filteredCamps.map(r=>r.campName);

  // ── 3. Filtra anúncios pelas campanhas selecionadas (clique nas linhas) ──
  const hasFilter=S.selectedCamps.size>0;
  let allowedAdCodes=null;
  if(hasFilter){
    allowedAdCodes=new Set();
    for(const c of campRows){ if(S.selectedCamps.has(c.campName)) c.adCodes.forEach(code=>allowedAdCodes.add(code)); }
  }
  const adRowsScope=hasFilter?adRowsAll.filter(r=>allowedAdCodes.has(r.advCode)):adRowsAll;

  const {col,dir}=S.aSort;
  const sortedAdsAll=[...adRowsScope].sort((a,b)=>{
    const av=a[col]??0,bv=b[col]??0;
    if(typeof av==="string") return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return dir==="asc"?av-bv:bv-av;
  });
  const searchA=S.adSearch.trim().toLowerCase();
  const filteredAds=searchA?sortedAdsAll.filter(r=>(r.adName+" "+r.advCode+" "+r.campName).toLowerCase().includes(searchA)):sortedAdsAll;
  S._adOrder=filteredAds.map(r=>r.advCode);

  // ── 4. Totais do topo (respeitam o filtro de campanha) ───────────────────
  function sumTotals(list){
    const t=list.reduce((a,r)=>({spend:a.spend+r.spend,clicks:a.clicks+r.clicks,impressions:a.impressions+r.impressions,
      checkouts:a.checkouts+r.checkouts,qtd:a.qtd+r.qtd,valor:a.valor+r.valor}),
      {spend:0,clicks:0,impressions:0,checkouts:0,qtd:0,valor:0});
    t.cpc=t.clicks>0?t.spend/t.clicks:0;
    t.ctr=t.impressions>0?(t.clicks/t.impressions)*100:0;
    t.cpm=t.impressions>0?(t.spend/t.impressions)*1000:0;
    t.cpv=t.qtd>0?t.spend/t.qtd:0;
    t.ticket=t.qtd>0?t.valor/t.qtd:0;
    t.roas=t.spend>0?t.valor/t.spend:0;
    return t;
  }
  const tot=sumTotals(adRowsScope);

  // Vendas de tráfego sem anúncio identificado (SCK pago mas sem advCode reconhecido) — global, não filtra por campanha
  const totalTrafego=getTotals(getDaily(start,end));
  const totAllAds=sumTotals(adRowsAll);
  const semAdvQtd=Math.max(totalTrafego.vendas-totAllAds.qtd,0);
  const semAdvValor=Math.max(totalTrafego.faturamento-totAllAds.valor,0);

  function sc(v,meta,hi){ return statusColor(v,meta,hi); }
  function thC(col_,lbl,sortFn,extraClass=""){
    const active=(sortFn==="camp"?cCol:col)===col_;
    const activeDir=sortFn==="camp"?cDir:dir;
    const arrow=active?(activeDir==="asc"?" ▲":" ▼"):" ↕";
    const fn=sortFn==="camp"?`sortCampanhas('${col_}')`:`sortAnuncios('${col_}')`;
    return `<th class="${extraClass}" onclick="${fn}" style="color:${active?"var(--text)":"var(--hint)"}">${lbl}<span style="color:${active?"#60a5fa":"var(--hint)"};margin-left:2px">${arrow}</span></th>`;
  }
  function statusDotFor(active,hasData){
    const color=!hasData?"var(--border-h)":active?"#22c55e":"#ef4444";
    const title=!hasData?"Sem dados":active?"Ativo":"Pausado";
    return `<span class="status-dot" style="background:${color}" title="${title}"></span>`;
  }
  function checkbox(sel,color){
    return `<div style="width:14px;height:14px;border-radius:3px;border:1.5px solid ${sel?color:"var(--border-h)"};background:${sel?color:"transparent"};display:flex;align-items:center;justify-content:center;margin:0 auto">
      ${sel?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </div>`;
  }

  // ── 5. Painel de resumo agregado da seleção (campanhas OU anúncios) ─────
  function selectionPanel(){
    const selCampNames=[...S.selectedCamps];
    const selAdCodes=[...S.selectedAds];
    if(selCampNames.length<1 && selAdCodes.length<1) return "";
    let pSpend=0,pQtd=0,pClicks=0,pImpr=0,pValor=0;
    if(selCampNames.length>0){
      for(const c of campRows){ if(!S.selectedCamps.has(c.campName)) continue;
        pSpend+=c.spend; pQtd+=c.qtd; pClicks+=c.clicks; pImpr+=c.impressions; pValor+=c.valor; }
    } else {
      for(const r of adRowsAll){ if(!S.selectedAds.has(r.advCode)) continue;
        pSpend+=r.spend; pQtd+=r.qtd; pClicks+=r.clicks; pImpr+=r.impressions; pValor+=r.valor; }
    }
    const pCpv=pQtd>0?pSpend/pQtd:0, pRoas=pSpend>0?pValor/pSpend:0, pTicket=pQtd>0?pValor/pQtd:0;
    const pCtr=pImpr>0?(pClicks/pImpr)*100:0, pCpm=pImpr>0?(pSpend/pImpr)*1000:0, pCpc=pClicks>0?pSpend/pClicks:0;
    const label=selCampNames.length>0?`${selCampNames.length} campanha${selCampNames.length>1?"s":""} selecionada${selCampNames.length>1?"s":""}`:`${selAdCodes.length} anúncio${selAdCodes.length>1?"s":""} selecionado${selAdCodes.length>1?"s":""}`;
    function box(lbl,val,color){ return `<div style="background:var(--card);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--hint);margin-bottom:3px">${lbl}</div><div style="font-size:13px;font-weight:700;color:${color||"var(--text-strong)"};font-family:'JetBrains Mono',monospace">${val}</div></div>`; }
    return `<div style="background:rgba(59,130,246,.06);border:1px solid rgba(96,165,250,.25);border-radius:12px;padding:14px 18px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">📊 Resumo da seleção — ${label}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">
        ${box("Investimento",fBRL(pSpend))}
        ${box("Vendas",pQtd)}
        ${box("Custo/Venda",pQtd>0?fBRL(pCpv):"—",pQtd>0?sc(pCpv,META_CPV,false):"var(--hint)")}
        ${box("ROAS",pRoas>0?pRoas.toFixed(2)+"x":"—",pRoas>0?sc(pRoas,META_ROAS,true):"var(--hint)")}
        ${box("Ticket Médio",pQtd>0?fBRL(pTicket):"—")}
        ${box("CTR",fPct(pCtr),sc(pCtr,METAS_T.ctr.val,true))}
        ${box("CPM",fBRL(pCpm),sc(pCpm,METAS_T.cpm.val,false))}
        ${box("CPC",fBRL(pCpc),sc(pCpc,METAS_T.cpc.val,false))}
      </div>
    </div>`;
  }

  // ── 6. Resumo de Anúncios (texto copiável para WhatsApp) ─────────────────
  function resumoAdsPanel(){
    if(!S.selectedAds.size) return "";
    const fDM=iso=>{if(!iso)return"";const[,m,d]=iso.split("-");return d+"/"+m;};
    const selRows=[...adRowsAll].filter(r=>S.selectedAds.has(r.advCode)).sort((a,b)=>b.qtd-a.qtd);
    const hdr=`*Melhores ads - Rafa Livramento - ${S.productName}*\n_${fDM(start)} a ${fDM(end)}_`;
    const blocks=selRows.map(r=>{
      const lines=["Nome do ad  ⤵️",r.adName||r.advCode];
      if(r.igUrl) lines.push(r.igUrl);
      lines.push("Investimento:\t"+fBRL(r.spend));
      lines.push("Vendas:\t"+r.qtd);
      lines.push("Cust/ venda:\t"+(r.qtd>0?fBRL(r.cpv):"—"));
      lines.push("");
      lines.push("CPC:\t"+fBRL(r.cpc));
      lines.push("CPM:\t"+fBRL(r.cpm));
      lines.push("CTR:\t"+fPct(r.ctr));
      lines.push("—————————");
      return lines.join("\n");
    }).join("\n");
    const txt=hdr+"\n\n"+blocks;
    setTimeout(()=>{const elp=document.getElementById("resumo-ads-pre");if(elp)elp._text=txt;},0);
    return `<div style="background:var(--card);border:1px solid rgba(16,185,129,.3);border-radius:14px;padding:20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div>
          <div class="section-lbl" style="margin:0;color:#6ee7b7">Resumo de Anúncios</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px">${selRows.length} ad(s) · ${fDM(start)} a ${fDM(end)}</div>
        </div>
        <button id="copy-ads-btn" onclick="copyResumoAds()" style="font-size:11px;font-weight:600;padding:7px 16px;border-radius:9px;border:1px solid rgba(16,185,129,.4);background:rgba(16,185,129,.15);color:#6ee7b7;cursor:pointer;font-family:'DM Sans',sans-serif">📋 Copiar resumo</button>
      </div>
      <pre id="resumo-ads-pre" style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:12px;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.6;font-family:'JetBrains Mono',monospace;overflow-x:auto">${txt.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Anúncios</div>
        <div class="hdr-sub">atualizado em: ${D().updated||"—"} · ${filteredCamps.length}/${sortedCampsAll.length} campanhas · ${filteredAds.length}/${sortedAdsAll.length} anúncios${hasFilter?" · filtrando "+S.selectedCamps.size+" campanha"+(S.selectedCamps.size>1?"s":""):""} · somente vendas de tráfego</div>
      </div>
      <div>${statusLegend()}</div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}

    <div class="section-lbl" style="margin-top:0">Resumo do período${hasFilter?" · campanhas selecionadas":""}</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:20px">

// PÁGINA: Resumo diário
// ══════════════════════════════════════════════════════════════════════════
function renderResumo(){
  const el=document.getElementById("page-resumo");if(!el)return;
  const _resumoFocus=document.activeElement?.id;
  const today=todayISO(), yest=yesterdayISO();
  const start=S.startDate||today, end=S.endDate||today;

  function periodMetrics(s,e){
    const daily=getDailyT(s,e);
    const t=getTotalsT(daily);
    const dd=D();
    let valor=0;
    for(const d of Object.keys(dd.vendas).filter(d=>d>=s&&d<=e)) valor+=(dd.vendas[d]?.valor||0);
    t.valor=valor;
    t.roas=t.spend>0?valor/t.spend:0;
    t.cpv=t.vendas>0?t.spend/t.vendas:0;
    const ups=getUpsellTotals(s,e);
    t.upsQtd=ups.qtd; t.upsValor=ups.valor;
    return t;
  }

  const tot  = periodMetrics(start, end);
  const ontem= periodMetrics(yest,  yest);
  const hojeBase = periodMetrics(today, today);
  const hoje = {...hojeBase};
  if(S.manualSpendHoje!==null){
    hoje.spend=S.manualSpendHoje;
    hoje.cpv=hoje.vendas>0?hoje.spend/hoje.vendas:0;
    hoje.roas=hoje.spend>0?hoje.valor/hoje.spend:0;
  }

  function em(val, meta, higher){
    if(val===0) return "";
    const ratio=higher ? val/meta : meta/val;
    if(ratio>=1)   return "🟢";
    if(ratio>=0.85) return "🟡";
    return "🔴";
  }
  function fDM(iso){ if(!iso) return "—"; const [,m,d]=iso.split("-"); return `${d}/${m}`; }
  const dateLabel= start===end ? fDM(start) : `${fDM(start)} a ${fDM(end)}`;

  function block(label, m, isTotal){
    const cpvE  =em(m.cpv,      META_CPV,              false);
    const roasE =em(m.roas,     META_ROAS,             true);
    const pcE   =em(m.txPagChk, METAS_T.txPagChk.val,  true);
    const cvE   =em(m.txChkVnd, METAS_T.txChkVnd.val,  true);
    const cnE   =em(m.connect,  METAS_T.connect.val,   true);
    const cpcE  =em(m.cpc,      METAS_T.cpc.val,       false);
    const ctrE  =em(m.ctr,      METAS_T.ctr.val,       true);
    const cpmE  =em(m.cpm,      METAS_T.cpm.val,       false);
    const vLabel=isTotal?"Vendas (período)":"Vendas";
    const cpvLabel=isTotal?"Custo por venda (período)":"Custo por venda";
    return (
`*-> ${label}*
Investimento:\t${fBRL(m.spend)}\t
${vLabel}:\t${m.vendas}\t
${cpvLabel}:\t${fBRL(m.cpv)}\t${cpvE} ${fBRL(META_CPV)}
ROAS:\t${m.roas.toFixed(2)}\t${roasE} ${META_ROAS.toFixed(2)}x

Tx conv Pág-Checkout:\t${m.txPagChk.toFixed(1)}%\t${pcE} ${METAS_T.txPagChk.val}%
Tx conv Checkout-Vendas:\t${m.txChkVnd.toFixed(1)}%\t${cvE} ${METAS_T.txChkVnd.val}%
Connect Rate:\t${m.connect.toFixed(2)}%\t${cnE} ${METAS_T.connect.val}%

CPC:\t${fBRL(m.cpc)}\t${cpcE} ${fBRL(METAS_T.cpc.val)}
CTR:\t${m.ctr.toFixed(2)}%\t${ctrE} ${METAS_T.ctr.val}%
CPM:\t${fBRL(m.cpm)}\t${cpmE} ${fBRL(METAS_T.cpm.val)}${m.upsQtd?`

Upsell (${S.upsellName}):\t${m.upsQtd} vendas · ${fBRL(m.upsValor)}\t`:""}`
    );
  }

  const resumoText =
`*Rafa Livramento - ${S.productName}*\t\t

_${dateLabel}_\t\t

${block("Total", tot, true)}

${block("Ontem", ontem, false)}

${block("Hoje", hoje, false)}`;

  function row(lbl, val, metaVal, emoji){
    const hasVal=val!==null&&val!==undefined;
    return `<div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
      <span style="color:var(--muted);font-size:12px">${lbl}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong)">${hasVal?val:"—"}</span>
      <span style="font-size:13px;min-width:28px;text-align:right">${emoji||""}<span style="font-size:10px;color:var(--hint);margin-left:4px">${metaVal||""}</span></span>
    </div>`;
  }
  function section(label, m, isTotal, isHoje=false){
    const cpvE  =em(m.cpv,      META_CPV,              false);
    const roasE =em(m.roas,     META_ROAS,             true);
    const pcE   =em(m.txPagChk, METAS_T.txPagChk.val,  true);
    const cvE   =em(m.txChkVnd, METAS_T.txChkVnd.val,  true);
    const cnE   =em(m.connect,  METAS_T.connect.val,   true);
    const cpcE  =em(m.cpc,      METAS_T.cpc.val,       false);
    const ctrE  =em(m.ctr,      METAS_T.ctr.val,       true);
    const cpmE  =em(m.cpm,      METAS_T.cpm.val,       false);
    const vLabel=isTotal?"Vendas (período)":"Vendas";
    const cpvLabel="Custo por venda";
    const isManual=isHoje&&S.manualSpendHoje!==null;
    const spendRow=isHoje?`
      <div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
        <span style="color:var(--muted);font-size:12px">Investimento</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input id="manual-spend-input"
            value="${isManual?String(m.spend.toFixed(2)).replace('.',','):''}"
            placeholder="${fBRL(m.spend)}"
            onblur="setManualSpendHoje(this.value||'0')"
            onkeydown="if(event.key==='Enter')this.blur()"
            style="background:${isManual?'rgba(251,191,36,.08)':'var(--surf)'};border:1px solid ${isManual?'rgba(251,191,36,.5)':'var(--border)'};border-radius:6px;color:${isManual?'#fbbf24':'var(--text-strong)'};font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 8px;outline:none;width:120px;transition:all .15s">
          ${isManual?`<button onclick="clearManualSpend()" title="Restaurar valor do Sheets" style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35);color:#fbbf24;cursor:pointer;font-family:'DM Sans',sans-serif">↩ Restaurar</button>`:''}
        </div>
        <span style="font-size:13px;min-width:28px;text-align:right">${isManual?'✏️':''}</span>
      </div>`:row("Investimento", fBRL(m.spend), "", "");
    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--text-strong);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">→ ${label}</div>
      ${spendRow}
      ${row(vLabel, m.vendas, "", "")}
      ${row(cpvLabel, fBRL(m.cpv), `meta ${fBRL(META_CPV)}`, cpvE)}
      ${row("ROAS", m.roas.toFixed(2), `meta ${META_ROAS.toFixed(2)}x`, roasE)}
      <div style="height:10px"></div>
      ${row("Tx conv Pág-Checkout", m.txPagChk.toFixed(1)+"%", `meta ${METAS_T.txPagChk.val}%`, pcE)}
      ${row("Tx conv Checkout-Vendas", m.txChkVnd.toFixed(1)+"%", `meta ${METAS_T.txChkVnd.val}%`, cvE)}
      ${row("Connect Rate", m.connect.toFixed(2)+"%", `meta ${METAS_T.connect.val}%`, cnE)}
      <div style="height:10px"></div>
      ${row("CPC", fBRL(m.cpc), `meta ${fBRL(METAS_T.cpc.val)}`, cpcE)}
      ${row("CTR", m.ctr.toFixed(2)+"%", `meta ${METAS_T.ctr.val}%`, ctrE)}
      ${row("CPM", fBRL(m.cpm), `meta ${fBRL(METAS_T.cpm.val)}`, cpmE)}
      ${m.upsQtd?`<div style="height:10px"></div>${row("Upsell ("+S.upsellName+")", m.upsQtd+" vendas · "+fBRL(m.upsValor), "", "🎁")}`:""}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:16px">
      <div>
        <div class="hdr-title">Resumo diário</div>
        <div class="hdr-sub">período: ${dateLabel} · ontem: ${fDM(yest)} · hoje: ${fDM(today)} · ${S.productName}</div>
      </div>
      <div>
        <button onclick="copyResumo()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.35);color:#93c5fd;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s">
          📋 Copiar resumo
        </button>
      </div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
      ${section("Total", tot, true)}
      ${section("Ontem", ontem, false)}
      ${section("Hoje", hoje, false, true)}
    </div>

    <div class="cc" style="max-width:640px">
      <div class="ch"><span class="ct">Texto para copiar (WhatsApp)</span></div>
      <pre id="resumo-preview" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.8;margin:0;user-select:all">${resumoText.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>
    </div>
    <p class="foot">Ontem e Hoje são sempre datas fixas · Total reflete o filtro de datas do header</p>`;

  el._resumoText=resumoText;
  if(document.activeElement?.id==="manual-spend-input"||_resumoFocus==="manual-spend-input"){
    requestAnimationFrame(()=>{
      const inp=document.getElementById("manual-spend-input");
      if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
    });
  }
}

// ── Header + dispatcher ─────────────────────────────────────────────────────
function renderHeader(){
  const tabs=[
    {id:"principal",icon:"⊞",label:"Principal"},
    {id:"trafego",icon:"⟳",label:"Métricas tráfego"},
    {id:"funil",icon:"▽",label:"Métricas do funil"},
    {id:"anuncios",icon:"◈",label:"Anúncios"},
    {id:"resumo",icon:"📋",label:"Resumo diário"},
  ];
  const tabsEl=document.getElementById("hdr-tabs");
  if(tabsEl) tabsEl.innerHTML=tabs.map(t=>`<button class="htab${S.currentPage===t.id?" htab-active":""}" onclick="navTo('${t.id}')"><span class="htab-icon">${t.icon}</span>${t.label}</button>`).join("");
  ["hoje","ontem","7d","30d","mes"].forEach(k=>{
    const b=document.getElementById("hpre-"+k);
    if(b) b.classList.toggle("on", S.activeQuick===k);
  });
  const _hs=document.getElementById("hdr-start"), _he=document.getElementById("hdr-end");
  if(_hs) _hs.value=S.startDate||"";
  if(_he) _he.value=S.endDate||"";
}

function render(){
  renderHeader();
  const ld=document.getElementById("loading");
  if(S.firstLoad&&S.loading){ld.style.display="flex";return;}
  ld.style.display="none";
  const errEl=document.getElementById("err-panel");
  if(errEl){
    if(S.error){
      errEl.style.display="flex";
      errEl.innerHTML=`<div style="background:#1e1014;border:1px solid #f87171;border-radius:12px;padding:24px 28px;max-width:700px;width:100%">
        <div style="color:#f87171;font-weight:700;font-size:15px;margin-bottom:12px">⚠️ Erro ao carregar dados</div>
        <code style="display:block;color:#fca5a5;font-size:12px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6">${S.error}</code>
        <button onclick="loadData(true)" style="margin-top:16px;padding:8px 18px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">↻ Tentar novamente</button>
      </div>`;
      return;
    } else { errEl.style.display="none"; }
  }
  if(S.currentPage==="principal") renderPrincipal();
  else if(S.currentPage==="trafego") renderTrafego();
  else if(S.currentPage==="funil") renderFunil();
  else if(S.currentPage==="anuncios") renderAnuncios();
  else if(S.currentPage==="resumo") renderResumo();
}

loadData();
</script>
</body>
</html>
