<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AGM — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--card:#121826;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.12);
  --text:#e8edf6;--text-strong:#f1f5fb;--muted:#8a96ab;--hint:#6b7689;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.16);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --surf:rgba(255,255,255,.03);
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.app-hdr{position:sticky;top:0;z-index:20;background:rgba(12,17,28,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 26px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:16px}
.funil-wrap{position:relative}
.funil-btn{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surf);cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;transition:border-color .15s}
.funil-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.funil-name{font-size:12px;font-weight:600;color:var(--text-strong)}
.funil-status{font-size:9px;color:var(--green);letter-spacing:.04em}
.hdr-tabs{display:flex;align-items:center;gap:4px}
.htab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.htab:hover{color:var(--text)}
.htab.htab-active{background:rgba(59,130,246,.16);color:#fff}
.hdr-right{display:flex;align-items:center;gap:8px}
.presets{display:flex;gap:4px}
.btn-pre{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-pre:hover{border-color:var(--border-h);color:var(--text)}
.btn-pre.on{background:rgba(59,130,246,.16);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}
.drbox{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s;padding:0 6px;gap:3px}
.drbox:focus-within{border-color:rgba(96,165,250,.5)}
.drbox-icon{color:var(--hint);font-size:12px;user-select:none}
.drbox input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 4px;cursor:pointer;color-scheme:dark;width:100px}
.drbox-sep{color:var(--hint);font-size:11px;user-select:none}
.btn-update{background:rgba(59,130,246,.16);border:1px solid rgba(96,165,250,.3);color:#60a5fa;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:0 0 16px rgba(59,130,246,.2)}
.btn-update:hover:not(:disabled){box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-update:disabled{opacity:.4;cursor:not-allowed}
.app-content{max-width:1640px;margin:0 auto;padding:22px 30px 40px}
.page{display:none}.page.active{display:block}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hdr-title{font-size:22px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text-strong);line-height:1.25}
.hdr-sub{margin-top:5px;font-size:11px;color:var(--hint);font-family:'JetBrains Mono',monospace}
.err{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--red);line-height:1.5}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.kc:hover{border-color:var(--border-h)}
.kc-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:700}
.kc-val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em;font-size:22px;line-height:1.1;color:var(--text-strong)}
.kc-val-sm{font-size:18px}
.kc-sub{font-size:10px;color:var(--hint);margin-top:5px;font-family:'JetBrains Mono',monospace}
.section-lbl{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;margin-top:20px}
.status-legend{display:flex;gap:16px;margin-bottom:14px}
.sl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--hint)}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px 14px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.lg{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ll{width:14px;height:2px;border-radius:2px}
.ld{width:7px;height:7px;border-radius:50%}
.charts-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.charts-2x3{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.overlay-btns{display:flex;gap:6px}
.btn-overlay{font-size:10px;padding:3px 10px;border-radius:5px;border:1px solid var(--border-h);color:var(--muted);background:transparent;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.btn-overlay:hover{border-color:var(--accent);color:var(--text)}
.btn-overlay.on{background:var(--accent-bg);border-color:rgba(96,165,250,.4);color:#60a5fa;font-weight:600}
.tip{background:#1a2236;border:1px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px;box-shadow:0 4px 16px rgba(2,6,20,.45);display:none;position:absolute;pointer-events:none;z-index:20;min-width:150px}
.tl{color:var(--hint);margin-bottom:5px;font-weight:500;font-size:10px;font-family:'JetBrains Mono',monospace}
.tr{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px;font-size:11px}
.tv{color:var(--text-strong);font-weight:600;font-family:'JetBrains Mono',monospace}
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{color:var(--hint);font-size:13px}
.foot{margin-top:18px;font-size:10px;color:var(--hint);text-align:center;font-family:'JetBrains Mono',monospace;opacity:.5}
canvas{display:block}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;filter:invert(1)}
.ana-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:0}
.ana-tab{padding:7px 14px;font-size:11px;font-weight:500;color:var(--hint);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.ana-tab:hover{color:var(--text)}
.ana-tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
.dash-sel{background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 26px 6px 10px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s}
.dash-sel:focus{border-color:rgba(96,165,250,.4)}
@media(max-width:768px){
  .app-hdr{height:auto;flex-wrap:wrap;padding:0;gap:0;align-items:stretch}
  .funil-wrap{padding:9px 14px;flex-shrink:0;border-bottom:1px solid var(--border);width:auto}
  .hdr-right{order:2;flex:1;min-width:0;display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 14px 8px 8px;flex-wrap:nowrap;border-bottom:1px solid var(--border)}
  .hdr-right::-webkit-scrollbar{display:none}
  .presets{flex-wrap:nowrap;gap:3px}
  .btn-pre{font-size:10px;padding:4px 8px;flex-shrink:0}
  .drbox{flex-shrink:0}
  .drbox input[type=date]{width:86px;font-size:10px}
  .btn-update{font-size:11px;padding:5px 10px;flex-shrink:0}
  .hdr-tabs{order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;gap:2px;padding:6px 14px 8px}
  .hdr-tabs::-webkit-scrollbar{display:none}
  .htab{flex-shrink:0;font-size:11px;padding:5px 10px}
  .app-content{padding:14px 10px 30px;max-width:100%}
  .hdr{flex-direction:column;gap:6px;margin-bottom:14px}
  .hdr-title{font-size:18px}
  .g3,.g4,.g5{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .kc{padding:12px 13px}
  .kc-val{font-size:18px}
  .kc-val-sm{font-size:15px}
  [style*="repeat(3,1fr)"],[style*="repeat(4,1fr)"],[style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"],[style*="repeat(7,1fr)"],[style*="repeat(8,1fr)"]{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  [style*="1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="1fr 260px"]{grid-template-columns:1fr!important}
  [style*="380px 1fr"]{grid-template-columns:1fr!important}
  .charts-2x2,.charts-2x3{grid-template-columns:1fr!important;gap:10px!important}
  .page div[style*="overflow:hidden"]{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
  .page table{font-size:10px!important}
  .page td,.page th{padding:7px 8px!important;white-space:nowrap}
  .page td:first-child,.page th:first-child{white-space:normal;min-width:90px;max-width:140px}
  .status-legend{flex-wrap:wrap;gap:8px}
  .ana-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .ana-tabs::-webkit-scrollbar{display:none}
  .ana-tab{flex-shrink:0;font-size:10px;padding:6px 10px}
  .section-lbl{margin-top:16px}
}
</style>
</head>
<body>
<header class="app-hdr">
  <div class="funil-wrap" style="padding:8px 12px">
    <select id="dash-selector" class="dash-sel" onchange="switchDash(this.value)">
      <option value="leadscore">⊞ Leadscore</option>
      <option value="seguidores">📈 Seguidores</option>
    </select>
  </div>
  <nav class="hdr-tabs" id="hdr-tabs">
    <button class="htab htab-active" onclick="navTo('principal')">⊞ Principal</button>
    <button class="htab" onclick="navTo('funil')">▽ Métricas do funil</button>
    <button class="htab" onclick="navTo('trafego')">⟳ Métricas tráfego</button>
    <button class="htab" onclick="navTo('anuncios')">◈ Campanhas / Anúncios</button>
    <button class="htab" onclick="navTo('resumo')">📋 Resumo diário</button>
  </nav>
  <div class="hdr-right">
    <div class="presets" id="hdr-presets">
      <button class="btn-pre" onclick="applyQuickCurrent('hoje')">Hoje</button>
      <button class="btn-pre" onclick="applyQuickCurrent('ontem')">Ontem</button>
      <button class="btn-pre" onclick="applyQuickCurrent('7d')">7 dias</button>
      <button class="btn-pre on" onclick="applyQuickCurrent('30d')">30 dias</button>
      <button class="btn-pre" onclick="applyQuickCurrent('mes')">Este mês</button>
    </div>
    <div class="drbox">
      <span class="drbox-icon">📅</span>
      <input type="date" id="hdr-start" onchange="onDCCurrent('s',this.value)"/>
      <span class="drbox-sep">→</span>
      <input type="date" id="hdr-end" onchange="onDCCurrent('e',this.value)"/>
    </div>
    <button class="btn-update" id="btn-update" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</header>

<div class="app-content">
  <div class="sw" id="loading"><div class="sp"></div><p class="st">Carregando dados...</p></div>
  <div id="err-panel" style="display:none;align-items:flex-start;justify-content:center;padding:40px 24px"></div>
  <div id="page-principal" class="page active"></div>
  <div id="page-funil"     class="page"></div>
  <div id="page-trafego"   class="page"></div>
  <div id="page-anuncios"  class="page"></div>
  <div id="page-resumo"    class="page"></div>
</div>

<script>
// ── Google Sheets ───────────────────────────────────────────────────────────
const SHEET_ID = "1v49yTlJrh7oFyCDGw8BLfIXcp66sj8hElzdYwKg7dpQ";
const GS_URL = (sheet) => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;


// ── Metas AGM ─────────────────────────────────────────────────────────────
const META_CPL = 150;

const METAS_T = {
  cpl:      {val:150,  higher:false},
  cpc:      {val:5.30, higher:false},
  ctr:      {val:0.75, higher:true},
  cpm:      {val:60,   higher:false},
  connect:  {val:70,   higher:true},
  txConvPg: {val:7,    higher:true},
};

// Chart colors
const CHART_COLOR = "#3b82f6";
const CHART_INV   = "#3b82f6";
const CHART_CPL   = "#fbbf24";
const CHART_LEADS = "#34d399";
const CHART_MQL   = "#a78bfa";

// ── State ─────────────────────────────────────────────────────────────────
const S = {
  meta:{},
  leadsD:{},
  mqlD:{},
  metaByAd:{}, metaByAdByDate:{},
  metaByCamp:{}, metaByCampByDate:{},
  metaTemp:{},
  leadsTemp:{},
  adIdToCampName:{},
  leadsFat:{},
  leadsDesafio:{},
  leadsDisp:{},
  leadsByAd:{}, leadsByCamp:{},
  mqlByAd:{}, mqlByCamp:{},
  // Seguidores dashboard state
  distMeta:{}, distSeg:{},
  distMetaByAd:{}, distMetaByAdByDate:{},
  distMetaByCampByDate:{},
  distSegByCamp:{}, distSegByAd:{},
  manualPlanDist:null,
  // Shared state
  activeDash:"leadscore",
  startDate:"", endDate:"", activeQuick:"30d",
  aSort:{col:"spend",dir:"desc"},
  cSort:{col:"spend",dir:"desc"},
  campSearch:"",
  adSearch:"",
  manualSpendHoje:null,
  selectedCamps:new Set(),
  selectedAds:new Set(),
  overlays:{cpl:{inv:false},ctr:{inv:false},cpm:{inv:false},cpc:{inv:false},txConvPg:{inv:false},connect:{inv:false}},
  currentPage:"principal",
  updated:null,
  loading:true, error:null, firstLoad:true,
};

// ── Date helpers (GMT-3 Brasil) ───────────────────────────────────────────
function nowBR(){ return new Date(Date.now()-(3*60*60*1000)); }
function toISODate(d){ return d.toISOString().split("T")[0]; }
function todayISO(){ return toISODate(nowBR()); }
function yesterdayISO(){ const d=nowBR();d.setDate(d.getDate()-1);return toISODate(d); }
function nDaysAgoISO(n){ const d=nowBR();d.setDate(d.getDate()-n);return toISODate(d); }
function firstOfMonthISO(){ const d=nowBR();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
function addDays(iso,n){ const d=new Date(iso+"T12:00:00Z");d.setDate(d.getDate()+n);return toISODate(d); }
function subDays(iso,n){ return addDays(iso,-n); }

// ── Format helpers ────────────────────────────────────────────────────────
function parseBRL(s){ if(!s||s==="-"||s==="0")return 0;return parseFloat(String(s).replace(/\./g,"").replace(",",".").trim())||0; }
function fBRL(n){ return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fBRLShort(n){ const a=Math.abs(n||0),sg=n<0?"-":"";if(a>=1000)return sg+"R$ "+(a/1000).toFixed(1).replace(".",",")+"k";return sg+"R$ "+Math.round(a); }
function fPct(n){ return (n||0).toFixed(1)+"%"; }
function fDate(iso){ if(!iso)return"";const[,m,d]=iso.split("-");return `${d}/${m}`; }
function fDateBR(iso){ if(!iso)return"";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`; }
function toISO(s){
  if(!s||s==="Date"||s==="")return null;
  s=String(s).trim().split(" ")[0];
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const p=s.split("/");
  if(p.length===3){const y=p[2].length===4?p[2]:"20"+p[2];return `${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}
  return null;
}

// ── Status helpers ────────────────────────────────────────────────────────
function statusColor(val,meta,higherIsBetter){
  if(!val||val===0)return "#8a96ab";
  const ratio=val/meta;
  if(higherIsBetter){ if(ratio>=1)return "#34d399";if(ratio>=0.9)return "#fbbf24";return "#f87171"; }
  else { if(ratio<=1)return "#34d399";if(ratio<=1.1)return "#fbbf24";return "#f87171"; }
}
function statusBorder(val,meta,higherIsBetter){
  const c=statusColor(val,meta,higherIsBetter);
  if(c==="#34d399") return "rgba(52,211,153,.22)";
  if(c==="#fbbf24") return "rgba(251,191,36,.22)";
  if(c==="#f87171") return "rgba(248,113,113,.22)";
  return "var(--border)";
}

// ── Ad code extractor ─────────────────────────────────────────────────────
function extractTemp(campName){
  const s=(campName||"").toLowerCase();
  if(s.includes("frio"))return"frio";
  if(s.includes("quente"))return"quente";
  return"";
}
function extractAdvCode(name){
  if(!name) return null;
  const clean=name.replace(/^teste-/i,"");
  const m=clean.match(/adv\d+/i);
  return m ? m[0].toLowerCase() : null;
}

// ── AGM-specific lead helpers ─────────────────────────────────────────────
function isTrafficLead(row){
  // Tráfego = Source vazio OU começa com "FB" (case-insensitive)
  // Não cai lead orgânico nessa planilha
  const src=(row["Source"]||"").trim().toUpperCase();
  return src===""||src.startsWith("FB");
}
function isOrganicLead(row){
  const origem=(row["Origem"]||"").trim().toLowerCase();
  if(origem) return origem.includes("org");
  return (row["Source"]||"").trim()==="instagram_bio";
}
// Deriva MQL a partir do faturamento: fatura > R$1 milhão = MQL
function isMQLFromFat(fat){
  if(!fat) return false;
  const s=fat.trim().toLowerCase();
  // "Abaixo de" → não MQL
  if(s.startsWith("abaixo")) return false;
  // "Acima de" → MQL
  if(s.startsWith("acima")) return true;
  // "Entre X e Y" → extrai o primeiro valor em milhões e verifica >= 2
  const m=s.match(/(\d+(?:[.,]\d+)?)\s*milh[ãaõoe]/i);
  if(m) return parseFloat(m[1].replace(",","."))>=2;
  return false;
}
function isMQL(row){
  // Prioridade 1: coluna "Acima 2M" (preenchida automaticamente na planilha)
  const acima2m=(row["Acima 2M"]||"").trim().toLowerCase();
  if(acima2m) return acima2m==="sim" || acima2m==="sim ";
  // Prioridade 2: deriva do faturamento quando coluna Acima 2M está vazia
  const fat=(row["Qual foi o faturamento anual da empresa em 2024?"]||"").trim();
  return isMQLFromFat(fat);
}

// ── CSV parser ────────────────────────────────────────────────────────────
function parseCSVText(text){
  const lines=text.split(/\r?\n/);
  const result=[];
  for(const line of lines){
    if(!line.trim()) continue;
    const row=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cur);cur="";}
      else cur+=c;
    }
    row.push(cur);
    result.push(row);
  }
  return {values:result};
}
function parseSheet(json){
  const rows=json.values||[];if(rows.length<2)return[];
  const h=rows[0];
  return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||"").trim()])));
}

// ── Load data ─────────────────────────────────────────────────────────────
async function loadData(force=false){
  S.loading=true; S.error=null; render();
  try{
    const [metaText, leadsText, distMetaText, distSegText] = await Promise.all([
      fetch(GS_URL("Base Meta")).then(r=>{ if(!r.ok)throw new Error("Erro ao buscar Base Meta: "+r.status); return r.text(); }),
      fetch(GS_URL("Base leads")).then(r=>{ if(!r.ok)throw new Error("Erro ao buscar Base leads: "+r.status); return r.text(); }),
      fetch(GS_URL("Base Meta - Seguidores AGM")).then(r=>{ if(!r.ok)throw new Error("Erro ao buscar Base Meta Seguidores: "+r.status); return r.text(); }),
      fetch(GS_URL("Base Seguidores AGM")).then(r=>{ if(!r.ok)throw new Error("Erro ao buscar Base Seguidores: "+r.status); return r.text(); }),
    ]);
    const mj = parseCSVText(metaText);
    const lj = parseCSVText(leadsText);

    // ── Process Meta ─────────────────────────────────────────────────────
    const mD={},mByAd={},mByAdByDate={},mByCamp={},mByCampByDate={},metaTemp={};
    const adIdToCampName={}; // Ad ID → Campaign Name atual (para cruzar com leads)
    for(const r of parseSheet(mj)){
      const d=toISO(r["Date"]);if(!d)continue;
      if(!mD[d])mD[d]={spend:0,clicks:0,impressions:0,metaLeads:0,landingViews:0,video75:0};
      const sp=parseBRL(r["Spend (Cost, Amount Spent)"]);
      const cl=parseInt(r["Action Link Clicks"]||0)||0;
      const im=parseInt(r["Impressions"]||0)||0;
      const ml=parseInt(r["Action Leads"]||0)||0;
      const lv=parseInt(r["Action Landing Page View"]||0)||0;
      const v75=parseInt(r["Video 75 Percent Watched Actions"]||0)||0;
      mD[d].spend+=sp;mD[d].clicks+=cl;mD[d].impressions+=im;
      mD[d].metaLeads+=ml;mD[d].landingViews+=lv;mD[d].video75+=v75;

      const adName=r["Ad Name"]||"";
      const adId=(r["Ad ID"]||r["Ad Id"]||"").trim();
      const igUrl=r["Instagram Permalink URL"]||"";
      const campName=r["Campaign Name"]||"—";
      const advCode=extractAdvCode(adName);
      const temp=extractTemp(campName);
      // Mapa Ad ID → Campaign Name para cruzar com leads
      if(adId&&campName&&campName!=="—") adIdToCampName[adId]=campName;

      if(temp){
        if(!metaTemp[temp])metaTemp[temp]={};
        if(!metaTemp[temp][d])metaTemp[temp][d]={spend:0,clicks:0,impressions:0,landingViews:0};
        metaTemp[temp][d].spend+=sp;metaTemp[temp][d].clicks+=cl;
        metaTemp[temp][d].impressions+=im;metaTemp[temp][d].landingViews+=lv;
      }
      if(advCode){
        if(!mByAd[advCode])mByAd[advCode]={advCode,adName,adIds:new Set(),spend:0,clicks:0,impressions:0,metaLeads:0,landingViews:0,igUrl:"",camps:new Set()};
        if(adId)mByAd[advCode].adIds.add(adId);
        mByAd[advCode].spend+=sp;mByAd[advCode].clicks+=cl;mByAd[advCode].impressions+=im;
        mByAd[advCode].metaLeads+=ml;mByAd[advCode].landingViews+=lv;
        if(igUrl&&!mByAd[advCode].igUrl)mByAd[advCode].igUrl=igUrl;
        if(campName&&campName!=="—")mByAd[advCode].camps.add(campName);
        if(!mByAdByDate[advCode])mByAdByDate[advCode]={};
        if(!mByAdByDate[advCode][d])mByAdByDate[advCode][d]={spend:0,clicks:0,impressions:0,metaLeads:0,adIds:new Set(),igUrl:""};
        mByAdByDate[advCode][d].spend+=sp;mByAdByDate[advCode][d].clicks+=cl;
        mByAdByDate[advCode][d].impressions+=im;mByAdByDate[advCode][d].metaLeads+=ml;
        if(adId)mByAdByDate[advCode][d].adIds.add(adId);
        if(igUrl&&!mByAdByDate[advCode][d].igUrl)mByAdByDate[advCode][d].igUrl=igUrl;
      }
      if(campName&&campName!=="—"){
        if(!mByCamp[campName])mByCamp[campName]={campName,spend:0,clicks:0,impressions:0,metaLeads:0,landingViews:0};
        mByCamp[campName].spend+=sp;mByCamp[campName].clicks+=cl;mByCamp[campName].impressions+=im;
        mByCamp[campName].metaLeads+=ml;mByCamp[campName].landingViews+=lv;
        if(!mByCampByDate[campName])mByCampByDate[campName]={};
        if(!mByCampByDate[campName][d])mByCampByDate[campName][d]={spend:0,clicks:0,impressions:0,metaLeads:0,adIds:new Set()};
        mByCampByDate[campName][d].spend+=sp;mByCampByDate[campName][d].clicks+=cl;
        mByCampByDate[campName][d].impressions+=im;mByCampByDate[campName][d].metaLeads+=ml;
        if(adId)mByCampByDate[campName][d].adIds.add(adId);
      }
    }
    S.meta=mD;S.metaByAd=mByAd;S.metaByAdByDate=mByAdByDate;
    S.metaByCamp=mByCamp;S.metaByCampByDate=mByCampByDate;S.metaTemp=metaTemp;
    S.adIdToCampName=adIdToCampName;

    // ── Process Leads ─────────────────────────────────────────────────────
    const lD={},mqlD={},fatCount={},desafioCount={},dispCount={};
    const leadsTemp={},lByAd={},lByCamp={},mqlByAd={},mqlByCamp={};

    // Col 6 e 7 trocados a partir de 27/01/2026 — normaliza por valor
    const DISP_KEY="Está disponível para uma conversa com um dos nossos especialistas nos próximos dias?";
    const EMP_KEY="Qual o nome da empresa e o segmento de atuação?";
    const DISP_STARTS=["sim","não","nao","prefiro ser"];
    function normalizeLeadCols(r){
      const dispVal=(r[DISP_KEY]||"").trim().toLowerCase();
      const empVal=(r[EMP_KEY]||"").trim().toLowerCase();
      if(!dispVal&&!empVal)return r;
      const dispLooksLikeDisp=DISP_STARTS.some(d=>dispVal.startsWith(d));
      const empLooksLikeDisp=DISP_STARTS.some(d=>empVal.startsWith(d));
      // Se o campo "empresa" parece disponibilidade e vice-versa — troca
      if(empLooksLikeDisp&&!dispLooksLikeDisp&&dispVal.length>0){
        const tmp=r[DISP_KEY];r[DISP_KEY]=r[EMP_KEY];r[EMP_KEY]=tmp;
      }
      return r;
    }

    for(const r of parseSheet(lj).map(normalizeLeadCols)){
      const dRaw=r["Data Correta"]||r["Data"]||"";
      const d=toISO(dRaw);if(!d)continue;
      if(!lD[d])lD[d]={traffic:0,organic:0};

      if(isTrafficLead(r)){
        lD[d].traffic++;
        const mql=isMQL(r);
        if(mql)mqlD[d]=(mqlD[d]||0)+1;

        // Faturamento: normaliza variações de label para um valor canônico
        const FAT_NORMALIZE={
          "Entre de R$10 e R$50 milhões":   "Entre R$10 e R$50 milhões",
          "Entre de R$5 e R$10 milhões":    "Entre R$5 e R$10 milhões",
          "Entre de R$2 e R$5 milhões":     "Entre R$2 e R$5 milhões",
          "Entre R$2 milhões e R$5 milhões":"Entre R$2 e R$5 milhões",
          "Entre 2 milhões e 5 milhões":    "Entre R$2 e R$5 milhões",
          "Entre R$ 1,5 milhão e 2 milhões":"Entre R$ 1,5 milhão e R$ 2 milhões",
        };
        const fatRaw=(r["Qual foi o faturamento anual da empresa em 2024?"]||"").trim();
        const fat=FAT_NORMALIZE[fatRaw]||fatRaw;
        if(fat)fatCount[fat]=(fatCount[fat]||0)+1;

        const desafio=(r["Qual o principal desafio da sua empresa hoje?"]||"").trim();
        if(desafio)desafioCount[desafio]=(desafioCount[desafio]||0)+1;

        const disp=(r["Está disponível para uma conversa com um dos nossos especialistas nos próximos dias?"]||"").trim();
        if(disp)dispCount[disp]=(dispCount[disp]||0)+1;

        // Attribution
        const campName=(r["Campanha Correta"]||r["Campaign"]||"").trim();
        const rawAd=(r["Anúncio Correto"]||r["Content"]||r["Term"]||"").trim();
        const advCode=extractAdvCode(rawAd)||(rawAd?rawAd.toLowerCase():null);

        // Temperatura: extrai Ad ID do Content UTM → busca Campaign Name atual no Meta → frio/quente
        function extractIdFromUtm(s){ const m=(s||"").match(/_id_(\d+)/); return m?m[1]:""; }
        const adIdFromContent=extractIdFromUtm(r["Content"]||r["Anúncio Correto"]||"");
        const campNameAtual=adIdFromContent?(S.adIdToCampName[adIdFromContent]||campName):campName;
        const temp=extractTemp(campNameAtual);
        if(temp){
          if(!leadsTemp[temp])leadsTemp[temp]={};
          if(!leadsTemp[temp][d])leadsTemp[temp][d]={traffic:0,mql:0};
          leadsTemp[temp][d].traffic++;
          if(mql)leadsTemp[temp][d].mql++;
        }

        if(campName){
          if(!lByCamp[campName])lByCamp[campName]={};
          lByCamp[campName][d]=(lByCamp[campName][d]||0)+1;
          if(mql){if(!mqlByCamp[campName])mqlByCamp[campName]={};mqlByCamp[campName][d]=(mqlByCamp[campName][d]||0)+1;}
        }
        if(advCode){
          if(!lByAd[advCode])lByAd[advCode]={};
          lByAd[advCode][d]=(lByAd[advCode][d]||0)+1;
          if(mql){if(!mqlByAd[advCode])mqlByAd[advCode]={};mqlByAd[advCode][d]=(mqlByAd[advCode][d]||0)+1;}
        }
      } else if(isOrganicLead(r)){
        lD[d].organic++;
      }
    }
    S.leadsD=lD;S.mqlD=mqlD;S.leadsFat=fatCount;
    S.leadsDesafio=desafioCount;S.leadsDisp=dispCount;
    S.leadsTemp=leadsTemp;S.leadsByAd=lByAd;S.leadsByCamp=lByCamp;
    S.mqlByAd=mqlByAd;S.mqlByCamp=mqlByCamp;

    // ── Process Seguidores Meta ───────────────────────────────────────────
    const distMetaJ=parseCSVText(distMetaText);
    const dMeta={},dMetaByAd={},dMetaByAdByDate={},dMetaByCampByDate={};
    for(const r of parseSheet(distMetaJ)){
      const d=toISO(r["Date"]);if(!d)continue;
      const sp=parseBRL(r["Spend (Cost, Amount Spent)"]);
      const cl=parseInt(r["Action Link Clicks"]||0)||0;
      const im=parseInt(r["Impressions"]||0)||0;
      const pv=parseInt(r["Instagram Profile Visits"]||0)||0;
      const v3=parseInt(r["Action 3s Video Views"]||r["Action Video View"]||0)||0;
      const v15=parseInt(r["Video 15 Sec Watched Actions"]||0)||0;
      if(!dMeta[d])dMeta[d]={spend:0,clicks:0,impressions:0,profileVisits:0,video3s:0,video15s:0};
      dMeta[d].spend+=sp;dMeta[d].clicks+=cl;dMeta[d].impressions+=im;
      dMeta[d].profileVisits+=pv;dMeta[d].video3s+=v3;dMeta[d].video15s+=v15;
      const adName=r["Ad Name"]||"";
      const campName=r["Campaign Name"]||"—";
      const igUrl=r["Instagram Permalink URL"]||"";
      if(adName){
        if(!dMetaByAd[adName])dMetaByAd[adName]={adName,igUrl:"",camps:new Set()};
        if(igUrl&&!dMetaByAd[adName].igUrl)dMetaByAd[adName].igUrl=igUrl;
        if(campName&&campName!=="—")dMetaByAd[adName].camps.add(campName);
        if(!dMetaByAdByDate[adName])dMetaByAdByDate[adName]={};
        if(!dMetaByAdByDate[adName][d])dMetaByAdByDate[adName][d]={spend:0,clicks:0,impressions:0,profileVisits:0,igUrl:""};
        dMetaByAdByDate[adName][d].spend+=sp;dMetaByAdByDate[adName][d].clicks+=cl;
        dMetaByAdByDate[adName][d].impressions+=im;dMetaByAdByDate[adName][d].profileVisits+=pv;
        if(igUrl&&!dMetaByAdByDate[adName][d].igUrl)dMetaByAdByDate[adName][d].igUrl=igUrl;
      }
      if(campName&&campName!=="—"){
        if(!dMetaByCampByDate[campName])dMetaByCampByDate[campName]={};
        if(!dMetaByCampByDate[campName][d])dMetaByCampByDate[campName][d]={spend:0,clicks:0,impressions:0,profileVisits:0};
        dMetaByCampByDate[campName][d].spend+=sp;dMetaByCampByDate[campName][d].clicks+=cl;
        dMetaByCampByDate[campName][d].impressions+=im;dMetaByCampByDate[campName][d].profileVisits+=pv;
      }
    }
    S.distMeta=dMeta;S.distMetaByAd=dMetaByAd;
    S.distMetaByAdByDate=dMetaByAdByDate;S.distMetaByCampByDate=dMetaByCampByDate;

    // ── Process Seguidores Orgânico ───────────────────────────────────────
    const distSegJ=parseCSVText(distSegText);
    const dSeg={},dSegByCamp={},dSegByAd={};
    for(const r of parseSheet(distSegJ)){
      const d=toISO(r["Dia"]);if(!d)continue;
      const seg=parseInt(r["Seguidores no Instagram"]||0)||0;
      const pv=parseInt(r["Visitas ao perfil do Instagram"]||0)||0;
      if(!dSeg[d])dSeg[d]={seguidores:0,profileVisits:0};
      dSeg[d].seguidores+=seg;dSeg[d].profileVisits+=pv;
      const campName=r["Nome da campanha"]||"";
      const adName=r["Nome do anúncio"]||"";
      if(campName){
        if(!dSegByCamp[campName])dSegByCamp[campName]={};
        if(!dSegByCamp[campName][d])dSegByCamp[campName][d]={seguidores:0,profileVisits:0};
        dSegByCamp[campName][d].seguidores+=seg;dSegByCamp[campName][d].profileVisits+=pv;
      }
      if(adName){
        if(!dSegByAd[adName])dSegByAd[adName]={};
        if(!dSegByAd[adName][d])dSegByAd[adName][d]={seguidores:0,profileVisits:0};
        dSegByAd[adName][d].seguidores+=seg;dSegByAd[adName][d].profileVisits+=pv;
      }
    }
    S.distSeg=dSeg;S.distSegByCamp=dSegByCamp;S.distSegByAd=dSegByAd;

    const allDates=Object.keys(mD).sort();
    S.updated=allDates.length?fDateBR(allDates[allDates.length-1]):"—";
    if(!S.startDate){S.startDate=nDaysAgoISO(29);S.endDate=todayISO();S.activeQuick="30d";}
    S.firstLoad=false;
  }catch(e){
    S.error="Erro ao carregar dados: "+e.message;
    S.firstLoad=false;
    console.error(e);
  }
  S.loading=false;
  render();
}

// ── Derived metrics ───────────────────────────────────────────────────────
function getDaily(start,end){
  const allDates=new Set([...Object.keys(S.meta),...Object.keys(S.leadsD)]);
  return Array.from(allDates).sort().filter(d=>d>=start&&d<=end).map(date=>{
    const m=S.meta[date]||{spend:0,clicks:0,impressions:0,metaLeads:0,landingViews:0};
    const l=S.leadsD[date]||{traffic:0,organic:0};
    const mql=S.mqlD[date]||0;
    return{date,label:fDate(date),spend:m.spend,
      trafficLeads:l.traffic,organicLeads:l.organic,mql,
      cpl:l.traffic>0?m.spend/l.traffic:0,
      cpmql:mql>0?m.spend/mql:0,
    };
  });
}
function getTotals(daily){
  const t=daily.reduce((a,d)=>({
    spend:a.spend+d.spend,
    trafficLeads:a.trafficLeads+d.trafficLeads,
    organicLeads:a.organicLeads+d.organicLeads,
    mql:a.mql+(d.mql||0),
  }),{spend:0,trafficLeads:0,organicLeads:0,mql:0});
  return{...t,
    cpl:t.trafficLeads>0?t.spend/t.trafficLeads:0,
    cpmql:t.mql>0?t.spend/t.mql:0,
    taxaMql:t.trafficLeads>0?(t.mql/t.trafficLeads)*100:0,
  };
}

function getDailyT(start,end){
  return Object.keys(S.meta).sort().filter(d=>d>=start&&d<=end).map(date=>{
    const m=S.meta[date];
    const l=S.leadsD[date]||{traffic:0,organic:0};
    const cpc   =m.clicks>0      ?m.spend/m.clicks:0;
    const ctr   =m.impressions>0 ?(m.clicks/m.impressions)*100:0;
    const cpm   =m.impressions>0 ?(m.spend/m.impressions)*1000:0;
    const connect   =m.clicks>0  ?(m.landingViews/m.clicks)*100:0;
    const txConvPg  =m.landingViews>0?(l.traffic/m.landingViews)*100:0;
    const cpl   =l.traffic>0     ?m.spend/l.traffic:0;
    return{date,label:fDate(date),spend:m.spend,
      cpc,ctr,cpm,connect,txConvPg,cpl,
      clicks:m.clicks,impressions:m.impressions,
      landingViews:m.landingViews,metaLeads:m.metaLeads,
      trafficLeads:l.traffic,video75:m.video75||0};
  });
}
function getTotalsT(daily){
  const t=daily.reduce((a,d)=>({
    spend:a.spend+d.spend,clicks:a.clicks+d.clicks,
    impressions:a.impressions+d.impressions,
    landingViews:a.landingViews+d.landingViews,
    metaLeads:a.metaLeads+d.metaLeads,
    trafficLeads:a.trafficLeads+d.trafficLeads,
    video75:a.video75+(d.video75||0),
  }),{spend:0,clicks:0,impressions:0,landingViews:0,metaLeads:0,trafficLeads:0,video75:0});
  return{...t,
    cpc:   t.clicks>0      ?t.spend/t.clicks:0,
    ctr:   t.impressions>0 ?(t.clicks/t.impressions)*100:0,
    cpm:   t.impressions>0 ?(t.spend/t.impressions)*1000:0,
    connect:  t.clicks>0       ?(t.landingViews/t.clicks)*100:0,
    txConvPg: t.landingViews>0 ?(t.trafficLeads/t.landingViews)*100:0,
    cpl:   t.trafficLeads>0?t.spend/t.trafficLeads:0,
  };
}
function getDayMetrics(iso){
  const m=S.meta[iso]||{spend:0,clicks:0,impressions:0,metaLeads:0,landingViews:0,video75:0};
  const l=S.leadsD[iso]||{traffic:0,organic:0};
  const mql=S.mqlD[iso]||0;
  return{
    spend:m.spend,
    cpc:   m.clicks>0      ?m.spend/m.clicks:0,
    ctr:   m.impressions>0 ?(m.clicks/m.impressions)*100:0,
    cpm:   m.impressions>0 ?(m.spend/m.impressions)*1000:0,
    connect:  m.clicks>0       ?(m.landingViews/m.clicks)*100:0,
    txConvPg: m.landingViews>0 ?(l.traffic/m.landingViews)*100:0,
    cpl:   l.traffic>0     ?m.spend/l.traffic:0,
    trafficLeads:l.traffic,
    impressions:m.impressions,landingViews:m.landingViews,video75:m.video75||0,
    mql,cpmql:mql>0?m.spend/mql:0,
    taxaMql:l.traffic>0?(mql/l.traffic)*100:0,
  };
}

// ── Temperatura period metrics ────────────────────────────────────────────
function getTempPeriodMetrics(temp,start,end){
  let spend=0,leads=0;
  for(const[d,v] of Object.entries(S.metaTemp[temp]||{})){if(d>=start&&d<=end)spend+=v.spend;}
  for(const[d,v] of Object.entries(S.leadsTemp[temp]||{})){if(d>=start&&d<=end)leads+=v.traffic;}
  return{spend,leads,cpl:leads>0?spend/leads:0};
}

// ── Navigation ────────────────────────────────────────────────────────────
function navTo(page){
  S.currentPage=page;
  window.scrollTo(0,0);
  document.querySelectorAll(".page").forEach(el=>{el.classList.toggle("active",el.id==="page-"+page);});
  render();
}
function applyQuickCurrent(k){
  const t=todayISO();
  const map={hoje:()=>({s:t,e:t}),ontem:()=>{const y=yesterdayISO();return{s:y,e:y}},
    "7d":()=>({s:nDaysAgoISO(6),e:t}),"30d":()=>({s:nDaysAgoISO(29),e:t}),mes:()=>({s:firstOfMonthISO(),e:t})};
  const r=map[k]?.();if(!r)return;
  S.startDate=r.s;S.endDate=r.e;S.activeQuick=k;render();
}
function onDCCurrent(w,v){
  if(w==="s")S.startDate=v;else S.endDate=v;S.activeQuick="";render();
}

// ── Canvas / Chart helpers ────────────────────────────────────────────────
const DPR=window.devicePixelRatio||1;
const GRID_C="rgba(255,255,255,0.06)";
const TICK_C="#6b7689";

function initCanvas(id,cssW,cssH){
  const c=document.getElementById(id);if(!c)return null;
  c.width=Math.round(cssW*DPR);c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px";c.style.height=cssH+"px";
  const ctx=c.getContext("2d");ctx.scale(DPR,DPR);
  return ctx;
}
function drawLineArea(ctx,xP,yP,vals,color,fill=true){
  if(vals.length<2)return;
  if(fill){
    const n=vals.length;
    ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<n;i++)ctx.lineTo(xP(i),yP(vals[i]));
    ctx.lineTo(xP(n-1),yP(0));ctx.lineTo(xP(0),yP(0));ctx.closePath();
    const g=ctx.createLinearGradient(0,0,0,ctx.canvas.height/DPR);
    g.addColorStop(0,color+"28");g.addColorStop(1,color+"00");
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.moveTo(xP(0),yP(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(xP(i),yP(vals[i]));
  ctx.stroke();
}
function drawBars(ctx,xP,yP,yZero,vals,color,barW){
  vals.forEach((v,i)=>{
    const x=xP(i)-barW/2,y=Math.min(yP(v),yZero),h=Math.abs(yP(v)-yZero);
    ctx.fillStyle=color+"cc";
    ctx.fillRect(x,y,barW,Math.max(h,1));
  });
}

// Dual-axis: Investimento (left) × CPL (right)
function drawDualAGM(id,data,rKey,rColor,metaVal,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:14,r:58,b:28,l:64};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const lVals=data.map(d=>d.spend||0);
  const rVals=data.map(d=>d[rKey]||0);
  const lMax=Math.max(...lVals,0.01)*1.15;
  const rMax=Math.max(...rVals,metaVal||0.01,0.01)*1.4;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-(v/lMax)*cH;
  const yPR=v=>P.t+cH-(v/rMax)*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";
    ctx.textAlign="right";ctx.fillText(fBRLShort(lMax-(i/4)*lMax),P.l-5,y+3.5);
    ctx.textAlign="left";ctx.fillText("R$"+(rMax-(i/4)*rMax).toFixed(0),P.l+cW+5,y+3.5);
  }
  if(metaVal){
    const mY=yPR(metaVal);
    ctx.strokeStyle=rColor+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(P.l,mY);ctx.lineTo(P.l+cW,mY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=rColor;ctx.font="9px 'Inter',sans-serif";ctx.textAlign="left";
    ctx.fillText("Meta R$"+metaVal,P.l+cW+4,mY-3);
  }
  drawLineArea(ctx,xP,yPL,lVals,CHART_INV,true);
  drawLineArea(ctx,xP,yPR,rVals,rColor,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

// Generic bar chart
function drawBarAGM(id,data,key,color,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:14,r:12,b:28,l:40};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const vals=data.map(d=>d[key]||0);
  const maxV=Math.max(...vals,1)*1.15;
  const n=data.length;
  const barW=Math.max(4,Math.min(18,(cW/n)*0.7));
  const xP=i=>P.l+(n>1?i/(n-1):0.5)*cW;
  const yP=v=>P.t+cH-(v/maxV)*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(Math.round(maxV-(i/4)*maxV),P.l-4,y+3);
  }
  drawBars(ctx,xP,yP,P.t+cH,vals,color,barW);
  const step=n>60?7:n>30?3:n>14?2:1;
  ctx.textAlign="center";
  vals.forEach((v,i)=>{
    if(v>0&&(n<=30||i%step===0)){
      ctx.fillStyle="#e8edf6";ctx.font=`bold ${Math.min(10,Math.max(7,barW))}px 'DM Mono',monospace`;
      ctx.fillText(v,xP(i),yP(v)-4);
    }
  });
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

function drawChartWithOverlay(id,data,key,fmtY,refVal,refLabel,overlayInv,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:12,r:overlayInv?52:12,b:26,l:52};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const vals=data.map(d=>+(d[key])||0);
  const invVals=data.map(d=>d.spend||0);
  let allL=[...vals];if(refVal!=null)allL.push(refVal);
  const lMax=Math.max(...allL,0.01)*1.2;
  const rMax=overlayInv?Math.max(...invVals,0.01)*1.2:1;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-(v/lMax)*cH;
  const yPR=v=>P.t+cH-(v/rMax)*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(fmtY(lMax-(i/4)*lMax),P.l-4,y+3);
  }
  if(overlayInv){
    for(let i=0;i<=4;i++){
      const y=P.t+(i/4)*cH;
      ctx.fillStyle=CHART_CPL;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="left";
      ctx.fillText(fBRLShort(rMax-(i/4)*rMax),P.l+cW+4,y+3);
    }
  }
  if(refVal!=null){
    const ry=yPL(refVal);
    ctx.strokeStyle=CHART_COLOR+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(P.l,ry);ctx.lineTo(P.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=CHART_COLOR;ctx.font="8px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText(refLabel||"Meta",P.l+cW,ry-3);
  }
  drawLineArea(ctx,xP,yPL,vals,CHART_COLOR,true);
  if(overlayInv)drawLineArea(ctx,xP,yPR,invVals,CHART_CPL,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

function setupTip(cid,tid,data,lines,padL=58,padR=12){
  const c=document.getElementById(cid),t=document.getElementById(tid);
  if(!c||!t)return;
  c.addEventListener("mousemove",e=>{
    const rect=c.getBoundingClientRect();
    const relX=(e.clientX-rect.left)-padL;
    const cW=rect.width-padL-padR;
    if(relX<0||relX>cW||!data.length){t.style.display="none";return;}
    const d=data[Math.max(0,Math.min(Math.round((relX/cW)*(data.length-1)),data.length-1))];
    let h=`<div class="tl">${d.label||d.date}</div>`;
    lines.forEach(l=>{
      h+=`<div class="tr"><span style="color:${l.color}">${l.name}</span><span class="tv">${(l.fmt||fBRL)(+(d[l.key])||0)}</span></div>`;
    });
    t.innerHTML=h;t.style.display="block";
    const tw=t.offsetWidth,x=e.clientX-rect.left;
    t.style.left=(x+12+tw>rect.width-8?x-tw-12:x+12)+"px";
    t.style.top=(e.clientY-rect.top-20)+"px";
  });
  c.addEventListener("mouseleave",()=>t.style.display="none");
}

// ── Render Funil ──────────────────────────────────────────────────────────
function renderFunil(){
  const el=document.getElementById("page-funil");if(!el)return;
  const allDates=Object.keys(S.meta).sort().filter(d=>(!S.startDate||d>=S.startDate)&&(!S.endDate||d<=S.endDate));
  let totalSpend=0;
  for(const d of allDates)totalSpend+=(S.meta[d]?.spend||0);
  let trafficLeads=0;
  const allLeadDates=Object.keys(S.leadsD).sort().filter(d=>(!S.startDate||d>=S.startDate)&&(!S.endDate||d<=S.endDate));
  for(const d of allLeadDates)trafficLeads+=(S.leadsD[d]?.traffic||0);
  let mqlTotal=0;
  for(const[d,n] of Object.entries(S.mqlD)){if((!S.startDate||d>=S.startDate)&&(!S.endDate||d<=S.endDate))mqlTotal+=n;}

  // Faturamento order for AGM — labels canônicos (após normalização)
  const FAT_ORDER=[
    "Acima de R$50 milhões",
    "Entre R$10 e R$50 milhões",
    "Entre R$5 e R$10 milhões",
    "Entre R$2 e R$5 milhões",
    "Entre R$ 1,5 milhão e R$ 2 milhões",
    "Abaixo de R$ 1,5 milhão",
    "Abaixo de R$2 milhões",
  ];

  function breakdown(data,order,title){
    const keys=order?order.filter(k=>data[k]>0):[...Object.keys(data)].sort((a,b)=>(data[b]||0)-(data[a]||0));
    // include any key not in order
    if(order){const inOrder=new Set(order);Object.keys(data).filter(k=>!inOrder.has(k)&&data[k]>0).forEach(k=>keys.push(k));}
    const total=Object.values(data).reduce((a,b)=>a+b,0)||1;
    const rows=keys.map(k=>{
      const n=data[k]||0;
      const pct=(n/total*100).toFixed(1);
      const w=Math.max(4,(n/total*100));
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;color:var(--text)">${k||"—"}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong)">${n} <span style="color:var(--muted);font-size:10px">(${pct}%)</span></span>
        </div>
        <div style="height:4px;background:var(--surf);border-radius:2px">
          <div style="height:4px;width:${w}%;background:var(--accent);border-radius:2px"></div>
        </div>
      </div>`;
    }).join("")||`<p style="color:var(--muted);font-size:12px;padding:12px 0">Sem dados</p>`;
    return `<div class="cc">
      <div class="section-lbl" style="margin-top:0">${title}</div>
      ${rows}
      <div style="margin-top:8px;font-size:10px;color:var(--hint)">${total} respostas</div>
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Métricas do Funil</div>
        <div class="hdr-sub">período: ${fDateBR(S.startDate)} a ${fDateBR(S.endDate)} · atualizado em: ${S.updated||"—"}</div>
      </div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:20px">
      ${kpiCard("Investimento",fBRL(totalSpend),"Meta Ads","var(--text-strong)")}
      ${kpiCard("Aplicações (Leads)",trafficLeads.toLocaleString("pt-BR"),"tráfego","var(--text-strong)")}
      ${kpiCard("MQL",mqlTotal.toLocaleString("pt-BR"),`taxa: ${trafficLeads>0?fPct((mqlTotal/trafficLeads)*100):"—"}`,"#a78bfa")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
      ${breakdown(S.leadsFat,FAT_ORDER,"Faturamento anual")}
      ${breakdown(S.leadsDesafio,null,"Principal desafio")}
      ${(()=>{
        const DISP_VALID=["Sim","Prefiro ser avisado com antecedência"];
        const dispFiltered=Object.fromEntries(DISP_VALID.filter(k=>S.leadsDisp[k]).map(k=>[k,S.leadsDisp[k]]));
        return breakdown(dispFiltered,DISP_VALID,"Disponibilidade para conversa");
      })()}
    </div>`;
}

    {key:"cpm",      lbl:"CPM",                fmt:fBRL,  meta:METAS_T.cpm.val,  higher:false},
    {key:"connect",  lbl:"Connect Rate",       fmt:fPct,  meta:METAS_T.connect.val,  higher:true},
    {key:"txConvPg", lbl:"Tx Conv. Formulário",fmt:fPct,  meta:METAS_T.txConvPg.val, higher:true},
  ];

  function metricsRow(dataObj){
    return METRICS.map(m=>{
      const rawVal=dataObj[m.key]||0;
      const color=m.meta?statusColor(rawVal,m.meta,m.higher):"var(--text-strong)";
      const bord=m.meta?statusBorder(rawVal,m.meta,m.higher):"var(--border)";
      return `<div class="kc" style="padding:12px 14px;border-color:${bord}">
        <div class="kc-lbl">${m.lbl}</div>
        <div class="kc-val" style="color:${color};font-size:17px">${m.fmt(rawVal)}</div>
        ${m.meta?`<div class="kc-sub">Meta: ${m.fmt(m.meta)}</div>`:""}
      </div>`;
    }).join("");
  }

  function overlayBtn(key){
    const on=S.overlays[key]?.inv;
    return `<button class="btn-overlay${on?" on":""}"
      style="${on?`border-color:${CHART_INV};color:${CHART_INV};background:${CHART_INV}18`:""}"
      onclick="toggleOverlay('${key}','inv')">+ Invest.</button>`;
  }

  const CHART_CONFIGS=[
    {key:"ctr",     lbl:"CTR",                fmt:fPct, meta:METAS_T.ctr.val,     metaLbl:`Meta ${METAS_T.ctr.val}%`},
    {key:"cpm",     lbl:"CPM",                fmt:fBRL, meta:METAS_T.cpm.val,     metaLbl:`Meta R$${METAS_T.cpm.val}`},
    {key:"cpc",     lbl:"CPC",                fmt:fBRL, meta:METAS_T.cpc.val,     metaLbl:`Meta R$${METAS_T.cpc.val}`},
    {key:"txConvPg",lbl:"Tx Conv. Formulário",fmt:fPct, meta:METAS_T.txConvPg.val,metaLbl:`Meta ${METAS_T.txConvPg.val}%`},
    {key:"connect", lbl:"Connect Rate",       fmt:fPct, meta:METAS_T.connect.val, metaLbl:`Meta ${METAS_T.connect.val}%`},
  ];

  function tChart(c){
    return `<div class="cc" style="position:relative">
      <div class="ch">
        <span class="ct">${c.lbl}</span>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:10px;color:var(--hint)">${c.metaLbl}</span>
          <div class="overlay-btns">${overlayBtn(c.key)}</div>
        </div>
      </div>
      <div style="position:relative">
        <canvas id="tc-${c.key}"></canvas>
        <div class="tip" id="tt-${c.key}"></div>
      </div>
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Métricas de Tráfego</div>
        <div class="hdr-sub">atualizado em: ${S.updated||"—"}</div>
      </div>
      <div>${statusLegend()}</div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}
    <div class="section-lbl">Hoje — ${fDateBR(today)}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:16px">
      ${metricsRow(todayM)}
    </div>
    <div class="section-lbl">Últimos 3 dias — ${fDateBR(p3Start)} a ${fDateBR(p3End)}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:20px">
      ${metricsRow(p3Tot)}
    </div>
    <div class="charts-2x3">
      ${CHART_CONFIGS.map(c=>tChart(c)).join("")}
    </div>`;

  requestAnimationFrame(()=>{
    const sW=document.getElementById(`tc-${CHART_CONFIGS[0].key}`)?.parentElement?.offsetWidth||500;
    CHART_CONFIGS.forEach(c=>{
      const ov=S.overlays[c.key]?.inv||false;
      drawChartWithOverlay(`tc-${c.key}`,daily,c.key,c.fmt,c.meta,c.metaLbl,ov,sW,170);
      const tipLines=[{key:c.key,color:CHART_COLOR,name:c.lbl,fmt:c.fmt}];
      if(ov)tipLines.push({key:"spend",color:CHART_INV,name:"Investimento",fmt:fBRL});
      setupTip(`tc-${c.key}`,`tt-${c.key}`,daily,tipLines,52,ov?52:12);
    });
  });
}

// ── Render Anúncios ───────────────────────────────────────────────────────
function renderAnuncios(){
  const el=document.getElementById("page-anuncios");if(!el)return;
  // Preserva foco dos campos de busca antes de re-renderizar
  const focusedId=document.activeElement?.id;
  const start=S.startDate,end=S.endDate;

  function sumPeriod(map,key){let t=0;for(const[d,n]of Object.entries(map[key]||{})){if(d>=start&&d<=end)t+=n;}return t;}
  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}
  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  // Campaign rows
  const campRows=[];
  for(const[campName,byDate] of Object.entries(S.metaByCampByDate)){
    let cSpend=0,cClicks=0,cImpr=0;
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){cSpend+=vals.spend;cClicks+=vals.clicks;cImpr+=vals.impressions;}}
    if(cSpend===0)continue;
    const cLeads=sumPeriod(S.leadsByCamp,campName);
    const cMql=sumPeriod(S.mqlByCamp,campName);
    campRows.push({campName,spend:cSpend,clicks:cClicks,impressions:cImpr,leads:cLeads,mql:cMql,
      cpc:cClicks>0?cSpend/cClicks:0, ctr:cImpr>0?(cClicks/cImpr)*100:0,
      cpm:cImpr>0?(cSpend/cImpr)*1000:0, cpl:cLeads>0?cSpend/cLeads:0,
      cpmql:cMql>0?cSpend/cMql:0});
  }
  const {col:cCol,dir:cDir}=S.cSort;
  const sortedCampsAll=[...campRows].sort((a,b)=>{
    const av=a[cCol]??0, bv=b[cCol]??0;
    if(typeof av==="string")return cDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return cDir==="asc"?av-bv:bv-av;
  });
  const campQ=S.campSearch.trim().toLowerCase();
  const sortedCamps=campQ?sortedCampsAll.filter(c=>c.campName.toLowerCase().includes(campQ)):sortedCampsAll;

  // Ad rows
  const hasCampSel=S.selectedCamps.size>0;
  const adRows=[];
  for(const[advCode,meta] of Object.entries(S.metaByAd)){
    if(hasCampSel){const adCamps=meta.camps||new Set();if(![...S.selectedCamps].some(c=>adCamps.has(c)))continue;}
    const byDate=S.metaByAdByDate[advCode]||{};
    let spend=0,clicks=0,impressions=0,igUrl="";
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){spend+=vals.spend;clicks+=vals.clicks;impressions+=vals.impressions;if(!igUrl&&vals.igUrl)igUrl=vals.igUrl;}}
    if(spend===0)continue;
    if(!igUrl)igUrl=meta.igUrl||"";
    const leads=sumPeriod(S.leadsByAd,advCode);
    const mql=sumPeriod(S.mqlByAd,advCode);
    adRows.push({advCode,adName:meta.adName||advCode,spend,clicks,impressions,leads,mql,igUrl,
      cpc:clicks>0?spend/clicks:0, ctr:impressions>0?(clicks/impressions)*100:0,
      cpm:impressions>0?(spend/impressions)*1000:0,
      cpl:leads>0?spend/leads:0, cpmql:mql>0?spend/mql:0});
  }

  const tot=campRows.reduce((a,c)=>({spend:a.spend+c.spend,clicks:a.clicks+c.clicks,impressions:a.impressions+c.impressions,leads:a.leads+c.leads,mql:a.mql+c.mql}),{spend:0,clicks:0,impressions:0,leads:0,mql:0});
  const totCpl=tot.leads>0?tot.spend/tot.leads:0;
  const totCpmql=tot.mql>0?tot.spend/tot.mql:0;
  const totCtr=tot.impressions>0?(tot.clicks/tot.impressions)*100:0;

  const {col,dir}=S.aSort;
  const sortedAll=[...adRows].sort((a,b)=>{
    const av=a[col]??0,bv=b[col]??0;
    if(typeof av==="string")return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return dir==="asc"?av-bv:bv-av;
  });
  const adQ=S.adSearch.trim().toLowerCase();
  const sorted=adQ?sortedAll.filter(a=>(a.adName||a.advCode).toLowerCase().includes(adQ)):sortedAll;

  // Ad resumo text
  const selAds=sorted.filter(a=>S.selectedAds.has(a.advCode));
  const hasSelAds=selAds.length>0;
  let adResumoText="";
  if(hasSelAds){
    const lines=["*Melhores ads - AGM*","",`_${dateLabel}_`,""];
    for(const a of selAds){
      lines.push(`Nome do ad ⤵️`);
      lines.push(a.adName||a.advCode);
      if(a.igUrl)lines.push(a.igUrl);
      lines.push(`Investimento:\t${fBRL(a.spend)}`);
      lines.push(`Leads:\t${a.leads}`);
      lines.push(`Custo por Lead:\t${a.leads>0?fBRL(a.cpl):"—"}`);
      lines.push(`MQL:\t${a.mql}`);
      lines.push(`Custo por MQL:\t${a.mql>0?fBRL(a.cpmql):"—"}`);
      lines.push(``);
      lines.push(`CPC:\t${fBRL(a.cpc)}`);
      lines.push(`CPM:\t${fBRL(a.cpm)}`);
      lines.push(`CTR:\t${fPct(a.ctr)}`);
      lines.push(``);
    }
    adResumoText=lines.join("\n");
  }
  el._adResumoText=adResumoText;
  // Restaura foco no input de busca se estava ativo
  if(focusedId==="camp-search-input"||focusedId==="ad-search-input"){
    requestAnimationFrame(()=>{
      const inp=document.getElementById(focusedId);
      if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
    });
  }

  function sc(v,m,hi){return statusColor(v,m,hi);}
  const TH="padding:10px 14px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);white-space:nowrap";
  const THL="padding:10px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);border-bottom:1px solid var(--border);white-space:nowrap";
  const THCK="width:36px;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)";

  function thC(col_,lbl,isCamp){
    const aC=isCamp?cCol:col,aD=isCamp?cDir:dir,active=aC===col_;
    const arrow=active?(aD==="asc"?" ↑":" ↓"):" ↕";
    const fn=isCamp?`sortCampanhas('${col_}')`:`sortAnuncios('${col_}')`;
    const isName=col_==="campName"||col_==="adName";
    const style=isName?`${THL};cursor:pointer;user-select:none`:TH;
    const color=active?"var(--text)":"var(--hint)";
    return `<th onclick="${fn}" style="${style};color:${color}">${lbl}<span style="color:${active?"#60a5fa":"var(--hint)"};font-size:9px;margin-left:3px">${arrow}</span></th>`;
  }

  function chkBox(checked){
    return `<div style="width:16px;height:16px;border-radius:4px;border:2px solid ${checked?"#10b981":"rgba(255,255,255,.2)"};background:${checked?"#10b981":"transparent"};display:flex;align-items:center;justify-content:center;margin:auto;transition:all .15s">
      ${checked?`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Campanhas / Anúncios</div>
        <div class="hdr-sub">atualizado em: ${S.updated||"—"} · ${sortedCamps.length} campanhas · ${sorted.length} anúncios${S.selectedAds.size>0?" · "+S.selectedAds.size+" selecionado"+(S.selectedAds.size>1?"s":""):""}</div>
      </div>
      <div>${statusLegend()}</div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:20px">
      ${kpiCard("Investimento",fBRL(tot.spend),"","var(--text-strong)")}
      ${kpiCard("Leads",tot.leads.toLocaleString("pt-BR"),"tráfego","var(--text-strong)")}
      ${kpiCard("Custo por Lead",totCpl>0?fBRL(totCpl):"—",`meta ${fBRL(META_CPL)}`,totCpl>0?sc(totCpl,META_CPL,false):"var(--text-strong)",false,totCpl,META_CPL,false)}
      ${kpiCard("MQL",tot.mql.toLocaleString("pt-BR"),"","#a78bfa")}
      ${kpiCard("Custo por MQL",totCpmql>0?fBRL(totCpmql):"—","","var(--text-strong)")}
    </div>

    <!-- Campanhas -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div class="section-lbl" style="margin-bottom:0">Campanhas</div>
      ${S.selectedCamps.size>0?`<button onclick="clearCamps()" style="font-size:10px;padding:3px 9px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#f87171;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">✕ Limpar (${S.selectedCamps.size})</button>`:""}
      <span style="font-size:10px;color:var(--hint)">Clique para filtrar anúncios por campanha</span>
    </div>
    <div style="margin-bottom:8px">
      <input id="camp-search-input" type="text" placeholder="🔍 Buscar campanha..." value="${S.campSearch.replace(/"/g,'&quot;')}"
        oninput="setCampSearch(this.value)"
        style="width:100%;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;box-sizing:border-box">
    </div>
    <div style="overflow-x:auto;margin-bottom:22px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--card)">
          <th style="${THCK}"></th>
          ${thC("campName","Campanha",true)}
          ${thC("spend","Investimento",true)}
          ${thC("leads","Leads",true)}
          ${thC("cpl","Custo por Lead",true)}
          ${thC("mql","MQL",true)}
          ${thC("cpmql","Custo por MQL",true)}
          ${thC("ctr","CTR",true)}
          ${thC("cpm","CPM",true)}
          ${thC("cpc","CPC",true)}
        </tr></thead>
        <tbody>
          ${sortedCamps.map(c=>{
            const sel=S.selectedCamps.has(c.campName);
            return `<tr onclick="toggleCamp('${c.campName.replace(/\\/g,"\\\\").replace(/'/g,"\\'")}' )" style="cursor:pointer;border-top:1px solid var(--border);background:${sel?"rgba(16,185,129,.1)":"transparent"}" onmouseover="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='rgba(255,255,255,.03)'" onmouseout="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='transparent'" data-sel="${sel?'1':'0'}">
              <td style="padding:8px;text-align:center;border-top:1px solid var(--border)">${chkBox(sel)}</td>
              <td style="padding:9px 14px;color:${sel?"#10b981":"var(--text)"};font-size:11px;font-weight:${sel?600:400};max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span title="${c.campName}">${c.campName}</span></td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-strong)">${fBRL(c.spend)}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace">${c.leads}</td>
              <td style="padding:9px 14px;text-align:right;color:${c.cpl>0?sc(c.cpl,META_CPL,false):"var(--muted)"}">${c.cpl>0?fBRL(c.cpl):"—"}</td>
              <td style="padding:9px 14px;text-align:right;color:#a78bfa;font-family:'JetBrains Mono',monospace">${c.mql}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong);font-family:'JetBrains Mono',monospace">${c.cpmql>0?fBRL(c.cpmql):"—"}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(c.ctr,METAS_T.ctr.val,true)}">${fPct(c.ctr)}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(c.cpm,METAS_T.cpm.val,false)}">${fBRL(c.cpm)}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(c.cpc,METAS_T.cpc.val,false)}">${fBRL(c.cpc)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <!-- Anúncios -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div class="section-lbl" style="margin-bottom:0">Anúncios</div>
      ${S.selectedAds.size>0?`<button onclick="clearAds()" style="font-size:10px;padding:3px 9px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#f87171;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">✕ Limpar (${S.selectedAds.size})</button>`:""}
      <span style="font-size:10px;color:var(--hint)">Clique para selecionar e gerar resumo</span>
    </div>
    <div style="margin-bottom:8px">
      <input id="ad-search-input" type="text" placeholder="🔍 Buscar anúncio..." value="${S.adSearch.replace(/"/g,'&quot;')}"
        oninput="setAdSearch(this.value)"
        style="width:100%;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;box-sizing:border-box">
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--card)">
          <th style="${THCK}"></th>
          ${thC("adName","Anúncio",false)}
          ${thC("spend","Investimento",false)}
          ${thC("leads","Leads",false)}
          ${thC("cpl","Custo por Lead",false)}
          ${thC("mql","MQL",false)}
          ${thC("cpmql","Custo por MQL",false)}
          ${thC("ctr","CTR",false)}
          ${thC("cpm","CPM",false)}
          ${thC("cpc","CPC",false)}
          <th style="${THCK}"></th>
        </tr></thead>
        <tbody>
          ${sorted.map(a=>{
            const sel=S.selectedAds.has(a.advCode);
            return `<tr onclick="toggleAd('${a.advCode}')" style="cursor:pointer;border-top:1px solid var(--border);background:${sel?"rgba(16,185,129,.1)":"transparent"}" onmouseover="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='rgba(255,255,255,.03)'" onmouseout="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='transparent'" data-sel="${sel?'1':'0'}">
              <td style="padding:8px;text-align:center;border-top:1px solid var(--border)">${chkBox(sel)}</td>
              <td style="padding:9px 14px;color:${sel?"#10b981":"var(--text)"};font-size:11px;font-weight:${sel?600:400};max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.adName||a.advCode}">${a.adName||a.advCode}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-strong)">${fBRL(a.spend)}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace">${a.leads}</td>
              <td style="padding:9px 14px;text-align:right;color:${a.cpl>0?sc(a.cpl,META_CPL,false):"var(--muted)"}">${a.cpl>0?fBRL(a.cpl):"—"}</td>
              <td style="padding:9px 14px;text-align:right;color:#a78bfa;font-family:'JetBrains Mono',monospace">${a.mql}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong);font-family:'JetBrains Mono',monospace">${a.mql>0?fBRL(a.cpmql):"—"}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(a.ctr,METAS_T.ctr.val,true)}">${fPct(a.ctr)}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(a.cpm,METAS_T.cpm.val,false)}">${fBRL(a.cpm)}</td>
              <td style="padding:9px 14px;text-align:right;color:${sc(a.cpc,METAS_T.cpc.val,false)}">${fBRL(a.cpc)}</td>
              <td style="padding:9px 14px;text-align:center" onclick="event.stopPropagation()">${a.igUrl?`<a href="${a.igUrl}" target="_blank" rel="noopener" style="display:inline-block;padding:3px 8px;border:1px solid rgba(99,179,237,.35);border-radius:5px;color:#63b3ed;text-decoration:none;font-size:10px;font-weight:600" title="Ver anúncio">Ver ↗</a>`:"—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    ${hasSelAds?`
    <div style="margin-top:22px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div class="section-lbl" style="margin-bottom:2px">Resumo de Anúncios</div>
          <div style="font-size:10px;color:var(--hint)">${selAds.length} ad(s): ${dateLabel}</div>

          Copiar resumo

// ── Render Resumo ─────────────────────────────────────────────────────────
function renderResumo(){
  const el=document.getElementById("page-resumo");if(!el)return;
  const today=todayISO(),yest=yesterdayISO();
  const start=S.startDate||today,end=S.endDate||today;

  function periodMetrics(s,e){
    const daily=getDailyT(s,e);
    const t=getTotalsT(daily);
    let tLeads=0,mqlCount=0;
    for(const[d,l] of Object.entries(S.leadsD)){if(d>=s&&d<=e)tLeads+=l.traffic;}
    for(const[d,n] of Object.entries(S.mqlD)){if(d>=s&&d<=e)mqlCount+=n;}
    t.trafficLeads=tLeads;
    t.cpl=tLeads>0?t.spend/tLeads:0;
    t.mql=mqlCount;
    t.cpmql=mqlCount>0?t.spend/mqlCount:0;
    t.taxaMql=tLeads>0?(mqlCount/tLeads)*100:0;
    // temperatura
    const frio=getTempPeriodMetrics("frio",s,e);
    const quente=getTempPeriodMetrics("quente",s,e);
    t.cplFrio=frio.cpl;t.cplQuente=quente.cpl;
    t.leadsFrio=frio.leads;t.leadsQuente=quente.leads;
    return t;
  }

  const tot  =periodMetrics(start,end);
  const ontem=periodMetrics(yest,yest);
  const hojeBase=periodMetrics(today,today);
  // Investimento manual: substitui spend de hoje e propaga diferença para o consolidado
  const hoje={...hojeBase};
  if(S.manualSpendHoje!==null){
    const diff=S.manualSpendHoje-hojeBase.spend;
    hoje.spend=S.manualSpendHoje;
    hoje.cpl=hoje.trafficLeads>0?hoje.spend/hoje.trafficLeads:0;
    hoje.cpmql=hoje.mql>0?hoje.spend/hoje.mql:0;
    tot.spend+=diff;
    tot.cpl=tot.trafficLeads>0?tot.spend/tot.trafficLeads:0;
    tot.cpmql=tot.mql>0?tot.spend/tot.mql:0;
  }

  function em(val,meta,higher){
    if(!val||val===0)return "";
    const ratio=higher?val/meta:meta/val;
    if(ratio>=1)return "🟢";if(ratio>=0.85)return "🟡";return "🔴";
  }
  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}
  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  // Format for WhatsApp text
  function fR(n,decimals=2){return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:decimals,maximumFractionDigits:decimals});}
  function fN(n){return (n||0).toLocaleString("pt-BR");}

  function blockText(icon,label,m){
    const cplE  =em(m.cpl,     META_CPL,           false);
    const cnE   =em(m.connect, METAS_T.connect.val, true);
    const pcE   =em(m.txConvPg,METAS_T.txConvPg.val,true);
    const cpcE  =em(m.cpc,     METAS_T.cpc.val,    false);
    const ctrE  =em(m.ctr,     METAS_T.ctr.val,    true);
    const cpmE  =em(m.cpm,     METAS_T.cpm.val,    false);
    const cplFrioStr =m.leadsFrio>0  ?fR(m.cplFrio) :"-";
    const cplQuenteStr=m.leadsQuente>0?fR(m.cplQuente):"-";
    return [
`${icon} *${label}*`,
``,
`Investimento:\t${fR(m.spend)}`,
`Aplicações Leads:\t${m.trafficLeads}`,
`Custo por Aplicação:\t${fR(m.cpl)}\t${cplE} Meta: R$ ${META_CPL}`,
`Custo por Aplicação frio:\t${cplFrioStr}`,
`Custo por Aplicação quente:\t${cplQuenteStr}`,
``,
`MQL:\t${m.mql}`,
`Custo por MQL:\t${m.mql>0?fR(m.cpmql):"—"}`,
`Taxa MQL:\t${(m.taxaMql||0).toFixed(0)}%`,
``,
`Tx conv formulário:\t${(m.txConvPg||0).toFixed(1)}%\t${pcE} Meta: ${METAS_T.txConvPg.val}%`,
`Connect Rate:\t${(m.connect||0).toFixed(1)}%\t${cnE} Meta: ${METAS_T.connect.val}%`,
``,
`Impressões\t${fN(m.impressions)}`,
`Views 75%\t${fN(m.video75)}`,
`Visualizações de página\t${fN(m.landingViews)}`,
``,
`CPC:\t${fR(m.cpc)}\t${cpcE} Meta: R$ ${METAS_T.cpc.val}`,
`CTR:\t${(m.ctr||0).toFixed(2)}%\t${ctrE} Meta: ${METAS_T.ctr.val}%`,
`CPM:\t${fR(m.cpm,0)}\t${cpmE} Meta: R$ ${METAS_T.cpm.val}`,
    ].join("\n");
  }

  const resumoText=
`*AGM - Consolidado - Página Leadscore*\t\t

_${dateLabel}_\t\t

${blockText("📶","Total",tot)}

${blockText("⬅️","Ontem",ontem)}

${blockText("⬇️","Hoje",hoje)}`;

  // Visual section helper
  function row(lbl,val,metaStr,emoji){
    return `<div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
      <span style="color:var(--muted);font-size:12px">${lbl}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong)">${val||"—"}</span>
      <span style="font-size:13px;min-width:28px;text-align:right">${emoji||""}<span style="font-size:10px;color:var(--hint);margin-left:4px">${metaStr||""}</span></span>
    </div>`;
  }
  function divider(){return `<div style="height:10px"></div>`;}

  function section(icon,label,m,isHoje=false){
    const cplE  =em(m.cpl,     META_CPL,           false);
    const cnE   =em(m.connect, METAS_T.connect.val, true);
    const pcE   =em(m.txConvPg,METAS_T.txConvPg.val,true);
    const cpcE  =em(m.cpc,     METAS_T.cpc.val,    false);
    const ctrE  =em(m.ctr,     METAS_T.ctr.val,    true);
    const cpmE  =em(m.cpm,     METAS_T.cpm.val,    false);
    const cplFrioStr =m.leadsFrio>0  ?fR(m.cplFrio) :"—";
    const cplQuenteStr=m.leadsQuente>0?fR(m.cplQuente):"—";
    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--text-strong);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">${icon} ${label}</div>
      ${isHoje
        ? `<div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
            <span style="color:var(--muted);font-size:12px">Investimento${S.manualSpendHoje!==null?' <span style="color:#fbbf24;font-size:9px">✎ manual</span>':''}</span>
            <input id="invest-hoje-input" type="text" value="${S.manualSpendHoje!==null?String(S.manualSpendHoje).replace('.',','):fR(m.spend).replace('R$ ','')}"
              onblur="setManualSpendHoje(this.value)"
              onkeydown="if(event.key==='Enter')this.blur()"
              style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong);background:var(--surf);border:1px solid rgba(251,191,36,.5);border-radius:6px;padding:2px 8px;width:100%;outline:none;text-align:left">
            <button onclick="clearManualSpend()" title="Usar valor real" style="font-size:11px;padding:2px 8px;background:${S.manualSpendHoje!==null?'rgba(251,191,36,.15)':'transparent'};border:1px solid ${S.manualSpendHoje!==null?'rgba(251,191,36,.4)':'transparent'};color:${S.manualSpendHoje!==null?'#fbbf24':'var(--hint)'};border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">${S.manualSpendHoje!==null?'↩ Restaurar':'✎'}</button>
          </div>`
        : row("Investimento",fR(m.spend),"","")
      }
      ${row("Aplicações Leads",m.trafficLeads,"","")}
      ${row("Custo por Aplicação",fR(m.cpl),`meta R$ ${META_CPL}`,cplE)}
      ${row("↳ frio",cplFrioStr,"","")}
      ${row("↳ quente",cplQuenteStr,"","")}
      ${divider()}
      ${row("MQL","<span style='color:#a78bfa'>"+m.mql+"</span>","","")}
      ${row("Custo por MQL",m.mql>0?fR(m.cpmql):"—","","")}
      ${row("Taxa MQL",(m.taxaMql||0).toFixed(0)+"%","","")}
      ${divider()}
      ${row("Tx conv formulário",(m.txConvPg||0).toFixed(1)+"%",`meta ${METAS_T.txConvPg.val}%`,pcE)}
      ${row("Connect Rate",(m.connect||0).toFixed(1)+"%",`meta ${METAS_T.connect.val}%`,cnE)}
      ${divider()}
      ${row("Impressões",(m.impressions||0).toLocaleString("pt-BR"),"","")}
      ${row("Views 75%",(m.video75||0).toLocaleString("pt-BR"),"","")}
      ${row("Visualizações de página",(m.landingViews||0).toLocaleString("pt-BR"),"","")}
      ${divider()}
      ${row("CPC",fR(m.cpc),`meta R$ ${METAS_T.cpc.val}`,cpcE)}
      ${row("CTR",(m.ctr||0).toFixed(2)+"%",`meta ${METAS_T.ctr.val}%`,ctrE)}
      ${row("CPM",fR(m.cpm,0),`meta R$ ${METAS_T.cpm.val}`,cpmE)}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:16px">
      <div>
        <div class="hdr-title">Resumo diário</div>
        <div class="hdr-sub">período: ${dateLabel} · ontem: ${fDM(yest)} · hoje: ${fDM(today)}</div>
      </div>
      <button onclick="copyResumo()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.35);color:#93c5fd;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s">
        📋 Copiar resumo
      </button>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}
    <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start">
      <div>
        ${section("📶","Total",tot)}
        ${section("⬅️","Ontem",ontem)}
        ${section("⬇️","Hoje",hoje,true)}
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;position:sticky;top:70px">
        <pre id="resumo-preview" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.8;margin:0;user-select:all">${resumoText.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>
      </div>
    </div>`;
  el._resumoText=resumoText;
}

function copyResumo(){
  const el=document.getElementById("page-resumo");
  const text=el?._resumoText||"";
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    document.querySelectorAll("[onclick='copyResumo()']").forEach(b=>{
      const orig=b.innerHTML;b.innerHTML="✓ Copiado!";b.style.color="#4ade80";
      setTimeout(()=>{b.innerHTML=orig;b.style.color="";},1800);
    });
  }).catch(()=>alert("Não foi possível copiar. Selecione o texto manualmente."));
}

function getDailyDist(start,end){
  const allDates=new Set([...Object.keys(S.distMeta),...Object.keys(S.distSeg)]);
  return Array.from(allDates).sort().filter(d=>d>=start&&d<=end).map(date=>{
    const m=S.distMeta[date]||{spend:0,clicks:0,impressions:0,profileVisits:0,video3s:0,video15s:0};
    const sg=S.distSeg[date]||{seguidores:0,profileVisits:0};
    const pv=m.profileVisits||sg.profileVisits||0;
    const seguidores=sg.seguidores||0;
    const hookRate=m.impressions>0?(m.video3s/m.impressions)*100:0;
    const holdRate=m.video3s>0?(m.video15s/m.video3s)*100:0;
    return{date,label:fDate(date),
      spend:m.spend,clicks:m.clicks,impressions:m.impressions,
      profileVisits:pv,video3s:m.video3s,video15s:m.video15s,seguidores,
      hookRate,holdRate,
      cpc:m.clicks>0?m.spend/m.clicks:0,
      ctr:m.impressions>0?(m.clicks/m.impressions)*100:0,
      cpm:m.impressions>0?(m.spend/m.impressions)*1000:0,
      custoPorVisita:pv>0?m.spend/pv:0,
      custoPorSeguidor:seguidores>0?m.spend/seguidores:0,
      txConvSeg:pv>0?(seguidores/pv)*100:0,
    };
  });
}
function getTotalsDist(daily){
  const t=daily.reduce((a,d)=>({
    spend:a.spend+d.spend,clicks:a.clicks+d.clicks,
    impressions:a.impressions+d.impressions,profileVisits:a.profileVisits+d.profileVisits,
    video3s:a.video3s+d.video3s,video15s:a.video15s+d.video15s,seguidores:a.seguidores+d.seguidores,
  }),{spend:0,clicks:0,impressions:0,profileVisits:0,video3s:0,video15s:0,seguidores:0});
  return{...t,
    hookRate:t.impressions>0?(t.video3s/t.impressions)*100:0,
    holdRate:t.video3s>0?(t.video15s/t.video3s)*100:0,
    cpc:t.clicks>0?t.spend/t.clicks:0,
    ctr:t.impressions>0?(t.clicks/t.impressions)*100:0,
    cpm:t.impressions>0?(t.spend/t.impressions)*1000:0,
    custoPorVisita:t.profileVisits>0?t.spend/t.profileVisits:0,
    custoPorSeguidor:t.seguidores>0?t.spend/t.seguidores:0,
    txConvSeg:t.profileVisits>0?(t.seguidores/t.profileVisits)*100:0,
  };
}
function getDayMetricsDist(iso){
  const m=S.distMeta[iso]||{spend:0,clicks:0,impressions:0,profileVisits:0,video3s:0,video15s:0};
  const sg=S.distSeg[iso]||{seguidores:0,profileVisits:0};
  const pv=m.profileVisits||sg.profileVisits||0;
  const seguidores=sg.seguidores||0;
  return{spend:m.spend,clicks:m.clicks,impressions:m.impressions,
    profileVisits:pv,video3s:m.video3s,video15s:m.video15s,seguidores,
    hookRate:m.impressions>0?(m.video3s/m.impressions)*100:0,
    holdRate:m.video3s>0?(m.video15s/m.video3s)*100:0,
    cpc:m.clicks>0?m.spend/m.clicks:0,
    ctr:m.impressions>0?(m.clicks/m.impressions)*100:0,
    cpm:m.impressions>0?(m.spend/m.impressions)*1000:0,
    custoPorVisita:pv>0?m.spend/pv:0,
    custoPorSeguidor:seguidores>0?m.spend/seguidores:0,
